<!DOCTYPE html>
<!-- Archivo: admin/empleados.html — Gestión CRUD de empleados y asignación de contraseñas -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Empleados — Abv Library</title>
    <script src="../config.js"></script>
    <link rel="stylesheet" href="../principal.css">
</head>
<body>

<!-- Verificación de sesión admin -->
<script>
if (sessionStorage.getItem("adminActivo") !== "true") {
    window.location.href = "./login.html";
}
</script>

<!-- Encabezado de la página -->
<header class="page-header">
    <h1><i class="bi bi-person-badge"></i> Gestión de Empleados</h1>
    <a href="./panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <!-- Formulario para agregar/editar empleado -->
    <div class="card">
        <h2 id="formTitulo">Agregar Empleado</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="correo_electronico">Correo electrónico</label>
                <input type="email" id="correo_electronico" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label for="ap_paterno">Apellido paterno</label>
                <input type="text" id="ap_paterno" placeholder="Apellido paterno">
            </div>
            <div class="form-group">
                <label for="ap_materno">Apellido materno</label>
                <input type="text" id="ap_materno" placeholder="Apellido materno">
            </div>
            <div class="form-group">
                <label for="fecha_de_nacimiento">Fecha de nacimiento</label>
                <input type="date" id="fecha_de_nacimiento">
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" placeholder="10 dígitos">
            </div>
            <div class="form-group">
                <label for="rol">Rol</label>
                <select id="rol">
                    <option value="">Selecciona un rol</option>
                    <option value="Vendedor">Vendedor</option>
                    <option value="Bibliotecario">Bibliotecario</option>
                    <option value="Administrador">Administrador</option>
                    <option value="Dueno">Dueño</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" id="btnAgregar" onclick="agregarEmpleado()">Agregar Empleado</button>
            <button type="button" id="btnActualizar" onclick="actualizarEmpleado()" style="display:none;">Guardar Cambios</button>
            <button type="button" id="btnCancelar" class="btn-secondary" onclick="limpiarFormulario()" style="display:none;">Cancelar</button>
        </div>
    </div>

    <!-- Tabla con la lista de empleados -->
    <div class="card">
        <h2>Lista de Empleados</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Empleado</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Teléfono</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaEmpleados"></tbody>
            </table>
        </div>
    </div>

</main>

<!-- Modal para asignar o cambiar contraseña de un empleado -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitulo">
        <h3 id="modalTitulo">Asignar Contraseña</h3>
        <p class="modal-sub" id="modalSub">Establece una contraseña para este usuario.</p>

        <input type="hidden" id="modalCorreo">

        <div class="form-group" id="grupoPassActual" style="display:none;">
            <label for="passActual">Contraseña actual</label>
            <input type="password" id="passActual" placeholder="Contraseña actual">
        </div>
        <div class="form-group">
            <label for="passNueva">Nueva contraseña</label>
            <input type="password" id="passNueva" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="form-group">
            <label for="passConfirmar">Confirmar contraseña</label>
            <input type="password" id="passConfirmar" placeholder="Repite la contraseña">
        </div>
        <p id="modalMensaje" class="mensaje"></p>

        <div class="modal-actions">
            <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button type="button" onclick="guardarPassword()">Guardar</button>
        </div>
    </div>
</div>

<!-- Lógica de gestión de empleados -->
<script>
window.onload = () => cargarEmpleados();

// Carga la lista de empleados desde el servidor
async function cargarEmpleados() {
    try {
        const response = await fetch("/empleados");
        const data = await response.json();
        const tabla = document.getElementById("tablaEmpleados");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">No hay empleados registrados</td></tr>`;
            return;
        }

        data.forEach(e => {
            const nombreCompleto = `${e.nombre} ${e.ap_paterno}${e.ap_materno ? ' ' + e.ap_materno : ''}`;
            const estadoIcon = e.tiene_password
                ? "<i class='bi bi-check-circle-fill' style='color:#16a34a;'></i>"
                : "<i class='bi bi-exclamation-triangle-fill' style='color:#f59e0b;'></i>";

            tabla.innerHTML += `
                <tr>
                    <td><strong>${nombreCompleto}</strong></td>
                    <td><small>${e.correo_electronico}</small></td>
                    <td><span style="background:#f1ebe4; padding:2px 8px; border-radius:4px; font-size:.8rem; font-weight:600;">${e.rol}</span></td>
                    <td>${e.telefono ?? "—"}</td>
                    <td>${estadoIcon}</td>
                    <td>
                        <div class="td-actions">
                            <button class="btn-secondary btn-sm" type="button"
                                onclick="cargarDatosEditar('${e.correo_electronico}','${e.nombre}','${e.ap_paterno}','${e.ap_materno ?? ""}','${e.fecha_de_nacimiento ?? ""}','${e.telefono ?? ""}','${e.rol}')">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn-secondary btn-sm" type="button"
                                onclick="abrirModalPassword('${e.correo_electronico}', ${e.tiene_password})">
                                <i class="bi bi-key"></i>
                            </button>
                            <button class="btn-danger btn-sm" type="button" onclick="eliminarEmpleado('${e.correo_electronico}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al consultar empleados.");
    }
}

// Registra un nuevo empleado
async function agregarEmpleado() {
    try {
        const empleado = obtenerDatos();
        const response = await fetch("/empleados", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(empleado)
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        limpiarFormulario();
        cargarEmpleados();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al agregar empleado.");
    }
}

// Carga datos del empleado en el formulario para edición
function cargarDatosEditar(correo, nombre, ap_paterno, ap_materno, fecha_de_nacimiento, telefono, rol) {
    document.getElementById("correo_electronico").value = correo;
    document.getElementById("nombre").value = nombre;
    document.getElementById("ap_paterno").value = ap_paterno;
    document.getElementById("ap_materno").value = ap_materno;
    document.getElementById("fecha_de_nacimiento").value = fecha_de_nacimiento ? fecha_de_nacimiento.split("T")[0] : "";
    document.getElementById("telefono").value = telefono;
    document.getElementById("rol").value = rol;
    document.getElementById("correo_electronico").disabled = true;
    document.getElementById("formTitulo").textContent = "Editar Empleado";
    document.getElementById("btnAgregar").style.display = "none";
    document.getElementById("btnActualizar").style.display = "inline-flex";
    document.getElementById("btnCancelar").style.display = "inline-flex";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

// Envía los cambios del empleado editado
async function actualizarEmpleado() {
    try {
        const correo = document.getElementById("correo_electronico").value;
        const empleado = obtenerDatos();
        const response = await fetch(`/empleados/${correo}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(empleado)
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        limpiarFormulario();
        cargarEmpleados();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al actualizar empleado.");
    }
}

// Elimina un empleado con confirmación
async function eliminarEmpleado(correo) {
    if (!(await confirmar("¿Seguro que quieres eliminar este empleado?"))) return;
    try {
        const response = await fetch(`/empleados/${correo}`, { method: "DELETE" });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        cargarEmpleados();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al eliminar empleado.");
    }
}

// Recopila los valores del formulario
function obtenerDatos() {
    return {
        correo_electronico:  document.getElementById("correo_electronico").value,
        nombre:              document.getElementById("nombre").value,
        ap_paterno:          document.getElementById("ap_paterno").value,
        ap_materno:          document.getElementById("ap_materno").value,
        fecha_de_nacimiento: document.getElementById("fecha_de_nacimiento").value,
        telefono:            document.getElementById("telefono").value,
        rol:                 document.getElementById("rol").value
    };
}

// Limpia el formulario y restaura el estado de "Agregar"
function limpiarFormulario() {
    ["correo_electronico","nombre","ap_paterno","ap_materno","fecha_de_nacimiento","telefono","rol"].forEach(id => {
        document.getElementById(id).value = "";
    });
    document.getElementById("correo_electronico").disabled = false;
    document.getElementById("formTitulo").textContent = "Agregar Empleado";
    document.getElementById("btnAgregar").style.display = "inline-flex";
    document.getElementById("btnActualizar").style.display = "none";
    document.getElementById("btnCancelar").style.display = "none";
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}

// ---- MODAL CONTRASEÑA ----

// Abre el modal para asignar o cambiar contraseña
function abrirModalPassword(correo, tienePassword) {
    document.getElementById("modalCorreo").value = correo;
    document.getElementById("passNueva").value = "";
    document.getElementById("passConfirmar").value = "";
    document.getElementById("passActual").value = "";
    document.getElementById("modalMensaje").textContent = "";
    document.getElementById("modalMensaje").className = "mensaje";

    const grupoActual = document.getElementById("grupoPassActual");
    if (tienePassword) {
        document.getElementById("modalTitulo").textContent = "Cambiar Contraseña";
        document.getElementById("modalSub").textContent = `Cambia la contraseña de ${correo}`;
        grupoActual.style.display = "block";
    } else {
        document.getElementById("modalTitulo").textContent = "Asignar Contraseña";
        document.getElementById("modalSub").textContent = `Asigna una contraseña a ${correo}`;
        grupoActual.style.display = "none";
    }

    document.getElementById("modalOverlay").classList.add("activo");
}

function cerrarModal() {
    document.getElementById("modalOverlay").classList.remove("activo");
}

// Cerrar modal al hacer clic fuera
document.getElementById("modalOverlay").addEventListener("click", function(e) {
    if (e.target === this) cerrarModal();
});

// Valida y guarda la nueva contraseña del empleado
async function guardarPassword() {
    const correo        = document.getElementById("modalCorreo").value;
    const passActual    = document.getElementById("passActual").value;
    const passNueva     = document.getElementById("passNueva").value;
    const passConfirmar = document.getElementById("passConfirmar").value;
    const msgEl         = document.getElementById("modalMensaje");

    if (!passNueva || passNueva.length < 8) {
        msgEl.textContent = "La contraseña debe tener al menos 8 caracteres.";
        msgEl.className = "mensaje mostrar";
        return;
    }
    if (passNueva !== passConfirmar) {
        msgEl.textContent = "Las contraseñas no coinciden.";
        msgEl.className = "mensaje mostrar";
        return;
    }

    try {
        const body = { password_nueva: passNueva };
        if (passActual) body.password_actual = passActual;

        const response = await fetch(`/usuarios/${encodeURIComponent(correo)}/password`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });
        const data = await response.json();

        if (data.error) {
            msgEl.textContent = data.error;
            msgEl.className = "mensaje mostrar";
            return;
        }

        cerrarModal();
        mostrarMensaje(data.mensaje, "success");
        cargarEmpleados();
    } catch (error) {
        console.error(error);
        msgEl.textContent = "Error al guardar la contraseña.";
        msgEl.className = "mensaje mostrar";
    }
}
</script>

<script src="../confirmar.js"></script><script src="../readonly.js"></script><script src="../theme.js"></script></body>
</html>
