<!DOCTYPE html>
<!-- Archivo: index.html — Página principal del catálogo público de libros (marketplace) -->
<html lang="es">
<head>
    <!-- Metadatos y hojas de estilo -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABV Library</title>
    <script src="./config.js"></script>
    <link rel="stylesheet" href="./principal.css">
    <link rel="stylesheet" href="./index.css">
</head>
<body class="marketplace">

<!-- Barra de navegación con logo, búsqueda y enlace a login -->
<nav class="navbar">
    <a class="navbar-logo" href="./index.html">
        <img src="./img/abv_library.jpeg" alt="ABV Library" class="navbar-logo-img">
        <span>ABV Library</span>
    </a>

    <form class="navbar-search" id="formBusqueda" role="search">
        <input type="text" id="buscarLibro" placeholder="Buscar libros, autores, géneros…" aria-label="Buscar">
        <button type="submit" class="btn-search" aria-label="Buscar"><i class="bi bi-search"></i></button>
    </form>

    <div class="navbar-links" id="navLinks">
        <a href="./login.html" class="nav-link" id="btnLogin"><i class="bi bi-box-arrow-in-right"></i> Iniciar sesión</a>
        <a href="./cliente/cliente.html" class="nav-link" id="btnMiCuenta" style="display:none;"><i class="bi bi-person"></i> Mi cuenta</a>
        <a href="#" class="nav-link" id="btnLogout" style="display:none;" onclick="cerrarSesionIndex()"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
    </div>
</nav>

<script>
// Mostrar/ocultar botones según sesión del cliente
(function() {
    const raw = localStorage.getItem("cliente");
    if (raw) {
        try {
            const cliente = JSON.parse(raw);
            // Expirar sesión después de 7 días
            if (cliente.login_timestamp && (Date.now() - cliente.login_timestamp) > 7 * 24 * 60 * 60 * 1000) {
                localStorage.removeItem("cliente");
                return;
            }
            document.getElementById("btnLogin").style.display = "none";
            document.getElementById("btnMiCuenta").style.display = "inline-flex";
            document.getElementById("btnLogout").style.display = "inline-flex";
        } catch {}
    }
})();

function cerrarSesionIndex() {
    localStorage.removeItem("cliente");
    window.location.reload();
}
</script>

<!-- Banner principal (hero) con mensaje de bienvenida -->
<section class="hero-banner">
    <div class="hero-content">
        <h1>Bienvenido a <span>ABV Library</span></h1>
        <p>Tu biblioteca digital. Gestiona libros, préstamos y ventas desde un solo lugar.</p>
    </div>
</section>

<!-- Catálogo de libros: grid dinámico con switch local/global -->
<main class="marketplace-main">
    <h2 class="section-title">Catálogo de Libros</h2>

    <!-- Controles: switch para alternar entre libros locales y API externa -->
    <div class="catalogo-controles">
        <div class="contenedor-switch">
            <span>Local</span>
            <label class="switch">
                <input type="checkbox" id="switchLibros" aria-label="Cambiar fuente de libros">
                <span class="slider"></span>
            </label>
            <span>Global</span>
        </div>
    </div>

    <!-- Grid dinámico donde se renderizan las tarjetas de libros -->
    <div class="catalogo-grid" id="catalogoGrid">
    </div>

    <p id="catalogoMensaje" class="catalogo-mensaje"></p>
</main>

<!-- Pie de página -->
<footer class="marketplace-footer">
    <p>© 2025 ABV Library. Todos los derechos reservados.</p>
</footer>

<!-- Lógica JavaScript del catálogo -->
<script>
// Referencias a elementos del DOM
const inputBusqueda = document.getElementById("buscarLibro");
const switchLibros = document.getElementById("switchLibros");
const catalogoGrid = document.getElementById("catalogoGrid");
const catalogoMensaje = document.getElementById("catalogoMensaje");
let temporizador;
let fuenteActual = "db";
let favoritos = new Set(); // ISBNs favoritos del cliente logueado

// Obtiene los datos del cliente logueado desde localStorage
function getClienteLogueado() {
    const data = localStorage.getItem("cliente");
    if (!data) return null;
    try { return JSON.parse(data); } catch { return null; }
}

// Carga la lista de favoritos del cliente desde el servidor
async function cargarFavoritos() {
    const cliente = getClienteLogueado();
    if (!cliente) return;
    try {
        const res = await fetch(`/favoritos/${encodeURIComponent(cliente.correo_electronico)}`);
        const data = await res.json();
        favoritos = new Set(data.map(f => f.isbn));
    } catch (e) {
        console.error("Error cargando favoritos:", e);
    }
}

// Agrega o quita un libro de favoritos (toggle)
async function toggleFavorito(isbn, titulo, autor, btn) {
    const cliente = getClienteLogueado();
    if (!cliente) {
        mostrarMensajeCatalogo("Inicia sesión como cliente para guardar favoritos.");
        return;
    }

    if (!isbn || isbn === "Sin ISBN") {
        mostrarMensajeCatalogo("Este libro no tiene ISBN y no se puede agregar a favoritos.");
        return;
    }

    const esFavorito = favoritos.has(isbn);

    try {
        if (esFavorito) {
            // Eliminar de favoritos
            await fetch(`/favoritos/${encodeURIComponent(cliente.correo_electronico)}/${encodeURIComponent(isbn)}`, {
                method: "DELETE"
            });
            favoritos.delete(isbn);
            btn.classList.remove("activo");
            btn.title = "Agregar a favoritos";
        } else {
            // Agregar a favoritos
            await fetch("/favoritos", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    correo_cliente: cliente.correo_electronico,
                    isbn,
                    titulo,
                    autor
                })
            });
            favoritos.add(isbn);
            btn.classList.add("activo");
            btn.title = "Quitar de favoritos";
        }
    } catch (e) {
        console.error("Error al actualizar favorito:", e);
    }
}

// Inicialización al cargar la página
window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const buscarParam = params.get("buscar") || "";
    if (buscarParam) {
        inputBusqueda.value = buscarParam;
    }
    await cargarFavoritos();
    cargarLibros(inputBusqueda.value);
};

// Búsqueda en tiempo real con debounce de 300ms
inputBusqueda.addEventListener("input", () => {
    clearTimeout(temporizador);
    temporizador = setTimeout(() => cargarLibros(inputBusqueda.value), 300);
});

// Prevenir envío del formulario y buscar manualmente
document.getElementById("formBusqueda").addEventListener("submit", (e) => {
    e.preventDefault();
    cargarLibros(inputBusqueda.value);
});

// Cambiar entre fuente local (BD) y global (API externa)
switchLibros.addEventListener("change", () => {
    fuenteActual = switchLibros.checked ? "api" : "db";
    inputBusqueda.value = "";
    cargarLibros("");
});

// Carga libros desde la fuente seleccionada y renderiza las tarjetas
async function cargarLibros(busqueda) {
    try {
        const url = fuenteActual === "db"
            ? `/libros?buscar=${encodeURIComponent(busqueda)}`
            : `/api/libros-externos?buscar=${encodeURIComponent(busqueda)}`;

        const response = await fetch(url);
        const data = await response.json();

        catalogoGrid.innerHTML = "";
        catalogoMensaje.textContent = "";

        if (data.error) {
            catalogoMensaje.textContent = data.error;
            return;
        }

        if (data.length === 0) {
            catalogoMensaje.textContent = "No se encontraron libros.";
            return;
        }

        // Renderizar cada libro como tarjeta
        data.forEach(libro => {
            const portada = libro.isbn && libro.isbn !== "Sin ISBN"
                ? `https://covers.openlibrary.org/b/isbn/${libro.isbn}-M.jpg`
                : "https://via.placeholder.com/120x180?text=N/A";

            const anio = libro.anio_publicacion
                ? (String(libro.anio_publicacion).includes("T")
                    ? String(libro.anio_publicacion).split("T")[0]
                    : libro.anio_publicacion)
                : "";

            const esFav = favoritos.has(libro.isbn);

            const card = document.createElement("div");
            card.className = "libro-card";
            card.innerHTML = `
                <div class="libro-card-img-wrapper">
                    <img class="libro-card-img" src="${portada}"
                        alt="Portada de ${libro.titulo}"
                        onerror="this.src='https://via.placeholder.com/120x180?text=N/A'">
                    <button class="btn-favorito ${esFav ? 'activo' : ''}"
                        title="${esFav ? 'Quitar de favoritos' : 'Agregar a favoritos'}"
                        aria-label="${esFav ? 'Quitar de favoritos' : 'Agregar a favoritos'}">
                        ♥
                    </button>
                </div>
                <div class="libro-card-body">
                    <h3 class="libro-card-titulo">${libro.titulo ?? "Sin título"}</h3>
                    <p class="libro-card-autor">${libro.autor ?? "Autor desconocido"}</p>
                    <p class="libro-card-meta">${libro.editorial ?? ""} ${anio ? "· " + anio : ""}</p>
                    ${libro.precio ? `<p class="libro-card-precio">$${Number(libro.precio).toFixed(2)}</p>` : ""}
                </div>
            `;

            // Evento del botón favorito
            const btnFav = card.querySelector(".btn-favorito");
            btnFav.addEventListener("click", (e) => {
                e.stopPropagation();
                toggleFavorito(libro.isbn, libro.titulo, libro.autor, btnFav);
            });

            catalogoGrid.appendChild(card);
        });
    } catch (error) {
        console.error(error);
        catalogoMensaje.textContent = "Error al cargar los libros.";
    }
}

// Muestra un mensaje toast en lugar de alert()
function mostrarMensajeCatalogo(texto) {
    let toast = document.getElementById("toastMsg");
    if (!toast) {
        toast = document.createElement("p");
        toast.id = "toastMsg";
        toast.className = "mensaje";
        document.body.appendChild(toast);
    }
    toast.textContent = texto;
    toast.className = "mensaje mostrar error";
    setTimeout(() => { toast.className = "mensaje"; toast.textContent = ""; }, 3000);
}
</script>

<script src="./confirmar.js"></script><script src="./theme.js"></script></body>
</html>
