<!DOCTYPE html>
<!-- Archivo: cambiar-password.html — Página para cambio obligatorio de contraseña en primer inicio de sesión -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contraseña — ABV Library</title>
    <script src="./config.js"></script>
    <link rel="stylesheet" href="./principal.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">

        <div class="logo"><i class="bi bi-key" style="font-size:2.5rem;"></i></div>
        <h1>Cambiar contraseña</h1>
        <p>Es tu primer inicio de sesión. Por seguridad, debes crear una nueva contraseña.</p>

        <p id="mensaje" class="mensaje"></p>

        <!-- Campo: nueva contraseña -->
        <div class="form-group">
            <label for="passwordNueva">Nueva contraseña (mínimo 8 caracteres)</label>
            <div style="position:relative;">
                <input type="password" id="passwordNueva" placeholder="••••••••" style="padding-right:40px;">
                <button type="button" onclick="togglePassword('passwordNueva', this)" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; box-shadow:none; min-width:auto; color:#64748b;">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <!-- Campo: confirmar contraseña -->
        <div class="form-group">
            <label for="passwordConfirmar">Confirmar nueva contraseña</label>
            <div style="position:relative;">
                <input type="password" id="passwordConfirmar" placeholder="••••••••" style="padding-right:40px;"
                    onkeydown="if(event.key==='Enter') cambiarPassword()">
                <button type="button" onclick="togglePassword('passwordConfirmar', this)" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; box-shadow:none; min-width:auto; color:#64748b;">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button type="button" class="btn-login" onclick="cambiarPassword()">Guardar nueva contraseña</button>

    </div>
</div>

<!-- Lógica para cambio de contraseña -->
<script>
// Verificar que el usuario llegó desde el flujo de login
const correo = sessionStorage.getItem("correo_cambio_password");

if (!correo) {
    window.location.href = "./login.html";
}

// Alterna visibilidad de la contraseña
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('i');
    if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
    } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
    }
}

// Valida y envía la nueva contraseña al servidor
async function cambiarPassword() {
    const nueva = document.getElementById("passwordNueva").value;
    const confirmar = document.getElementById("passwordConfirmar").value;

    if (!nueva || nueva.length < 8) {
        mostrarMensaje("La contraseña debe tener al menos 8 caracteres.");
        return;
    }

    if (nueva !== confirmar) {
        mostrarMensaje("Las contraseñas no coinciden.");
        return;
    }

    try {
        const res = await fetch(`/usuarios/${encodeURIComponent(correo)}/password`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password_nueva: nueva })
        });

        const data = await res.json();

        if (data.error) {
            mostrarMensaje(data.error);
            return;
        }

        mostrarMensaje("Contraseña actualizada. Redirigiendo...", "success");
        sessionStorage.removeItem("correo_cambio_password");

        setTimeout(() => {
            window.location.href = "./login.html";
        }, 1500);

    } catch (e) {
        mostrarMensaje("Error al cambiar la contraseña.");
    }
}

// Muestra un mensaje temporal al usuario
function mostrarMensaje(texto, tipo = "error") {
    const el = document.getElementById("mensaje");
    el.textContent = texto;
    el.className = "mensaje mostrar " + tipo;
    setTimeout(() => { el.className = "mensaje"; el.textContent = ""; }, 4000);
}
</script>

<script src="./confirmar.js"></script><script src="./theme.js"></script></body>
</html>
