<!-- public/bibliotecario/historial-prestamos.html -->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Préstamos</title>
    <link rel="stylesheet" href="/principal.css">
</head>

<body>

<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<h1>Historial de Préstamos</h1>
<p id="mensaje" class="mensaje"></p>

<a href="/bibliotecario/panel.html">
    <button type="button">Regresar al panel</button>
</a>

<hr>

<table border="1">
    <thead>
        <tr>
            <th>ID</th>
            <th>Cliente</th>
            <th>Bibliotecario</th>
            <th>Inicio</th>
            <th>Vencimiento</th>
            <th>Entrega</th>
            <th>Cantidad</th>
            <th>Estado</th>
            <th>Multa</th>
            <th>Acción</th>
        </tr>
    </thead>

    <tbody id="tablaPrestamos"></tbody>
</table>

<script>
window.onload = () => {
    cargarPrestamos();
};

async function cargarPrestamos() {
    try {
        const response = await fetch("/prestamos");
        const data = await response.json();

        const tabla = document.getElementById("tablaPrestamos");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `
                <tr>
                    <td colspan="10">No hay préstamos registrados</td>
                </tr>
            `;
            return;
        }

        data.forEach(prestamo => {
            tabla.innerHTML += `
                <tr>
                    <td>${prestamo.id_prestamo}</td>
                    <td>${prestamo.cliente}</td>
                    <td>${prestamo.bibliotecario}</td>
                    <td>${prestamo.dia_de_inicio ?? ""}</td>
                    <td>${prestamo.dia_de_vencimiento ?? ""}</td>
                    <td>${prestamo.dia_de_entrega ?? "Pendiente"}</td>
                    <td>${prestamo.cantidad_de_libros}</td>
                    <td>${prestamo.estado}</td>
                    <td>${prestamo.multa}</td>
                    <td>
                        ${
                            prestamo.dia_de_entrega
                            ? `<button type="button" disabled>Devuelto</button>`
                            : `<button type="button" onclick="devolverPrestamo(${prestamo.id_prestamo})">
                                Devolver
                              </button>`
                        }
                    </td>
                </tr>
            `;
        });

    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al cargar préstamos.");
    }
}

async function devolverPrestamo(id_prestamo) {
    try {
        const confirmar = confirm(
            "¿Confirmas la devolución de este préstamo?"
        );

        if (!confirmar) {
            return;
        }

        const response = await fetch(
            `/prestamos/${id_prestamo}/devolver`,
            {
                method: "PUT"
            }
        );

        const data = await response.json();

        if (data.error) {
            mostrarMensaje(data.error);
            return;
        }

        mostrarMensaje(data.mensaje, "success");

        cargarPrestamos();

    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al devolver préstamo.");
    }
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje ${tipo}`;
}
</script>

</body>
</html>
