<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Préstamos — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<header class="page-header">
    <h1><i class="bi bi-box-arrow-in-down-left"></i> Historial de Préstamos</h1>
    <a href="/bibliotecario/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <div class="card">
        <h2>Préstamos registrados</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Bibliotecario</th>
                        <th>Inicio</th>
                        <th>Vencimiento</th>
                        <th>Entrega</th>
                        <th>Cantidad</th>
                        <th>Estado</th>
                        <th>Multa</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tablaPrestamos"></tbody>
            </table>
        </div>
    </div>

</main>

<script>
window.onload = () => cargarPrestamos();

async function cargarPrestamos() {
    try {
        const response = await fetch("/prestamos");
        const data = await response.json();
        const tabla = document.getElementById("tablaPrestamos");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `<tr><td colspan="10" style="text-align:center;color:var(--text-muted)">No hay préstamos registrados</td></tr>`;
            return;
        }

        data.forEach(p => {
            const estadoBadge = p.estado === "Devuelto"
                ? `<span class="badge badge-returned">Devuelto</span>`
                : p.estado === "Vencido"
                    ? `<span class="badge badge-overdue">Vencido</span>`
                    : `<span class="badge badge-pending">Pendiente</span>`;

            tabla.innerHTML += `
                <tr>
                    <td>${p.id_prestamo}</td>
                    <td>${p.cliente}</td>
                    <td>${p.bibliotecario}</td>
                    <td class="fecha">${formatFecha(p.dia_de_inicio)}</td>
                    <td class="fecha">${formatFecha(p.dia_de_vencimiento)}</td>
                    <td class="fecha">${formatFecha(p.dia_de_entrega)}</td>
                    <td>${p.cantidad_de_libros}</td>
                    <td>${estadoBadge}</td>
                    <td>$${p.multa}</td>
                    <td>
                        ${p.dia_de_entrega
                            ? `<button class="btn-secondary btn-sm" disabled>Devuelto</button>`
                            : `<button class="btn-success btn-sm" type="button" onclick="devolverPrestamo(${p.id_prestamo})">Devolver</button>`
                        }
                    </td>
                </tr>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al cargar préstamos.");
    }
}

async function devolverPrestamo(id_prestamo) {
    if (!confirm("¿Confirmas la devolución de este préstamo?")) return;
    try {
        const response = await fetch(`/prestamos/${id_prestamo}/devolver`, { method: "PUT" });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        cargarPrestamos();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al devolver préstamo.");
    }
}

function formatFecha(fecha) {
    if (!fecha) return "—";
    return fecha.split("T")[0];
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
