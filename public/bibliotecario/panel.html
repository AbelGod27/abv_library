<!DOCTYPE html>
<!-- Archivo: bibliotecario/panel.html — Panel principal del bibliotecario con accesos a módulos -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Bibliotecario — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<!-- Verificación de sesión: redirige si no hay sesión activa de bibliotecario -->
<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<!-- Encabezado con título y botones de navegación -->
<header class="page-header">
    <h1><i class="bi bi-journal-bookmark"></i> Panel Bibliotecario</h1>
    <div style="display:flex; gap:8px;">
        <button class="btn-secondary btn-sm" id="btnIrAdmin" onclick="cambiarARol('admin')" style="display:none;"><i class="bi bi-arrow-left-right"></i> Ir a Admin</button>
        <button class="btn-secondary btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <!-- Información del bibliotecario logueado -->
    <div id="infoBibliotecario" class="panel-info"></div>

    <!-- Grid de tarjetas con accesos a cada módulo -->
    <div class="panel-grid">

        <a href="/bibliotecario/ventas.html" class="panel-card">
            <div class="icon"><i class="bi bi-cart3"></i></div>
            <span>Registrar Venta</span>
            <button>Abrir</button>
        </a>

        <a href="/bibliotecario/historial.html" class="panel-card">
            <div class="icon"><i class="bi bi-clipboard-data"></i></div>
            <span>Historial Ventas</span>
            <button>Abrir</button>
        </a>

        <a href="/bibliotecario/prestamos.html" class="panel-card">
            <div class="icon"><i class="bi bi-box-arrow-up-right"></i></div>
            <span>Registrar Préstamo</span>
            <button>Abrir</button>
        </a>

        <a href="/bibliotecario/historial-prestamos.html" class="panel-card">
            <div class="icon"><i class="bi bi-box-arrow-in-down-left"></i></div>
            <span>Historial Préstamos</span>
            <button>Abrir</button>
        </a>

        <a href="/bibliotecario/facturas.html" class="panel-card">
            <div class="icon"><i class="bi bi-receipt"></i></div>
            <span>Facturas</span>
            <button>Abrir</button>
        </a>

        <a href="/bibliotecario/donaciones.html" class="panel-card">
            <div class="icon"><i class="bi bi-gift"></i></div>
            <span>Registrar Donación</span>
            <button>Abrir</button>
        </a>

    </div>

</main>

<!-- Lógica del panel de bibliotecario -->
<script>
// Mostrar nombre y rol del bibliotecario logueado
const nombre = sessionStorage.getItem("nombreBibliotecario");
const rol    = sessionStorage.getItem("rolBibliotecario");
document.getElementById("infoBibliotecario").textContent = `Bienvenido, ${nombre} (${rol})`;

// Cierra la sesión y limpia datos de sessionStorage
function cerrarSesion() {
    sessionStorage.removeItem("bibliotecarioActivo");
    sessionStorage.removeItem("correoBibliotecario");
    sessionStorage.removeItem("nombreBibliotecario");
    sessionStorage.removeItem("rolBibliotecario");
    window.location.href = "/index.html";
}

// Permite cambiar al panel de admin sin re-login
function cambiarARol(rol) {
    if (rol === "admin") {
        sessionStorage.setItem("adminActivo", "true");
        window.location.href = "/admin/panel.html";
    }
}

// Mostrar botón "Ir a Admin" solo si el rol es Administrador o Dueño
if (["Administrador", "Dueno"].includes(rol)) {
    document.getElementById("btnIrAdmin").style.display = "inline-flex";
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

<script src="/theme.js"></script></body>
</html>
