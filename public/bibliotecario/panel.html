<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Bibliotecario — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<header class="page-header">
    <h1>📖 Panel Bibliotecario</h1>
    <button class="btn-secondary btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <div id="infoBibliotecario" class="panel-info"></div>

    <div class="panel-grid">

        <a href="/bibliotecario/ventas.html" class="panel-card">
            <div class="icon">🛒</div>
            <span>Registrar Venta</span>
            <button>Abrir</button>
        </a>

        <a href="/bibliotecario/historial.html" class="panel-card">
            <div class="icon">📋</div>
            <span>Historial Ventas</span>
            <button>Abrir</button>
        </a>

        <a href="/bibliotecario/prestamos.html" class="panel-card">
            <div class="icon">📤</div>
            <span>Registrar Préstamo</span>
            <button>Abrir</button>
        </a>

        <a href="/bibliotecario/historial-prestamos.html" class="panel-card">
            <div class="icon">📥</div>
            <span>Historial Préstamos</span>
            <button>Abrir</button>
        </a>

        <a href="/bibliotecario/facturas.html" class="panel-card">
            <div class="icon">🧾</div>
            <span>Facturas</span>
            <button>Abrir</button>
        </a>

    </div>

</main>

<script>
const nombre = sessionStorage.getItem("nombreBibliotecario");
const rol    = sessionStorage.getItem("rolBibliotecario");
document.getElementById("infoBibliotecario").textContent = `Bienvenido, ${nombre} (${rol})`;

function cerrarSesion() {
    sessionStorage.removeItem("bibliotecarioActivo");
    sessionStorage.removeItem("correoBibliotecario");
    sessionStorage.removeItem("nombreBibliotecario");
    sessionStorage.removeItem("rolBibliotecario");
    window.location.href = "/index.html";
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
