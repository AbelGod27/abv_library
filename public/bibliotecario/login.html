<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bibliotecario — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">

        <div class="logo"><i class="bi bi-journal-bookmark" style="font-size:2.5rem;"></i></div>
        <h1>Acceso Bibliotecario</h1>
        <p>Ingresa tus credenciales para continuar</p>

        <p id="mensaje" class="mensaje"></p>

        <div class="form-group">
            <label for="correoBibliotecario">Correo electrónico</label>
            <input type="email" id="correoBibliotecario" placeholder="correo@ejemplo.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label for="passwordBibliotecario">Contraseña</label>
            <input type="password" id="passwordBibliotecario" placeholder="••••••••" autocomplete="current-password">
        </div>

        <button type="button" class="btn-login" onclick="loginBibliotecario()">Ingresar</button>

        <p class="back-link">¿No eres bibliotecario? <a href="/index.html">Volver al inicio</a></p>

    </div>
</div>

<script>
async function loginBibliotecario() {
    try {
        const correo = document.getElementById("correoBibliotecario").value.trim();
        const password = document.getElementById("passwordBibliotecario").value;

        if (!correo || !password) {
            mostrarMensaje("Ingresa correo y contraseña.");
            return;
        }

        const response = await fetch("/login-vendedor", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ correo_electronico: correo, password })
        });

        const data = await response.json();

        if (data.acceso) {
            sessionStorage.setItem("bibliotecarioActivo", "true");
            sessionStorage.setItem("correoBibliotecario", correo);
            sessionStorage.setItem("nombreBibliotecario", data.empleado.nombre);
            sessionStorage.setItem("rolBibliotecario", data.empleado.rol);
            window.location.href = "/bibliotecario/panel.html";
        } else {
            mostrarMensaje(data.error);
        }
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al iniciar sesión.");
    }
}

document.getElementById("passwordBibliotecario").addEventListener("keydown", e => {
    if (e.key === "Enter") loginBibliotecario();
});

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
