<!DOCTYPE html>
<!-- Archivo: bibliotecario/login.html — Página de login para empleados (bibliotecarios/vendedores) -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Bibliotecario — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">

        <div class="logo"><i class="bi bi-journal-bookmark" style="font-size:2.5rem;"></i></div>
        <h1>Acceso Bibliotecario</h1>
        <p>Ingresa tus credenciales para continuar</p>

        <p id="mensaje" class="mensaje"></p>

        <!-- Formulario: correo y contraseña del empleado -->
        <div class="form-group">
            <label for="correoBibliotecario">Correo electrónico</label>
            <input type="email" id="correoBibliotecario" placeholder="correo@ejemplo.com" autocomplete="email">
        </div>

        <div class="form-group">
            <label for="passwordBibliotecario">Contraseña</label>
            <div style="position:relative;">
                <input type="password" id="passwordBibliotecario" placeholder="••••••••" autocomplete="current-password" style="padding-right:40px;">
                <button type="button" onclick="togglePass('passwordBibliotecario', this)" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; box-shadow:none; min-width:auto; color:#64748b;">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button type="button" class="btn-login" onclick="loginBibliotecario()">Ingresar</button>

        <p class="back-link">¿No eres bibliotecario? <a href="/index.html">Volver al inicio</a></p>

    </div>
</div>

<!-- Lógica de autenticación del bibliotecario -->
<script>
// Envía credenciales al endpoint de login de vendedor/bibliotecario
async function loginBibliotecario() {
    try {
        const correo = document.getElementById("correoBibliotecario").value.trim();
        const password = document.getElementById("passwordBibliotecario").value;

        if (!correo || !password) {
            mostrarMensaje("Ingresa correo y contraseña.");
            return;
        }

        const response = await fetch("/login-vendedor", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ correo_electronico: correo, password })
        });

        const data = await response.json();

        if (data.acceso) {
            sessionStorage.setItem("bibliotecarioActivo", "true");
            sessionStorage.setItem("correoBibliotecario", correo);
            sessionStorage.setItem("nombreBibliotecario", data.empleado.nombre);
            sessionStorage.setItem("rolBibliotecario", data.empleado.rol);
            window.location.href = "/bibliotecario/panel.html";
        } else {
            mostrarMensaje(data.error);
        }
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al iniciar sesión.");
    }
}

// Permite login con Enter
document.getElementById("passwordBibliotecario").addEventListener("keydown", e => {
    if (e.key === "Enter") loginBibliotecario();
});

// Alterna visibilidad de la contraseña
function togglePass(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { input.type = 'password'; icon.className = 'bi bi-eye'; }
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

<script src="/confirmar.js"></script><script src="/readonly.js"></script><script src="/theme.js"></script></body>
</html>
