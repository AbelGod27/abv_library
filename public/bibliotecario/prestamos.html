<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Préstamo — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<header class="page-header">
    <h1>📤 Registrar Préstamo</h1>
    <a href="/bibliotecario/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <div id="infoBibliotecario" class="panel-info"></div>

    <div class="card">
        <h2>Datos del préstamo</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="correo_cliente">Cliente</label>
                <select id="correo_cliente">
                    <option value="">Selecciona un cliente</option>
                </select>
            </div>
            <div class="form-group">
                <label for="isbn">Libro</label>
                <select id="isbn">
                    <option value="">Selecciona un libro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" min="1" value="1">
            </div>
            <div class="form-group">
                <label for="dia_de_vencimiento">Fecha de vencimiento</label>
                <input type="date" id="dia_de_vencimiento">
            </div>
        </div>

        <div class="form-actions">
            <button type="button" onclick="registrarPrestamo()">Registrar Préstamo</button>
        </div>
    </div>

</main>

<script>
const correoBibliotecario = sessionStorage.getItem("correoBibliotecario");
const nombreBibliotecario = sessionStorage.getItem("nombreBibliotecario");
const rolBibliotecario    = sessionStorage.getItem("rolBibliotecario");

document.getElementById("infoBibliotecario").textContent =
    `Bibliotecario: ${nombreBibliotecario} (${rolBibliotecario})`;

window.onload = () => { cargarClientes(); cargarLibros(); };

async function cargarClientes() {
    try {
        const response = await fetch("/clientes");
        const data = await response.json();
        const select = document.getElementById("correo_cliente");
        data.forEach(c => {
            select.innerHTML += `<option value="${c.correo_electronico}">${c.nombre} ${c.ap_paterno}</option>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al cargar clientes.");
    }
}

async function cargarLibros() {
    try {
        const response = await fetch("/libros");
        const data = await response.json();
        const select = document.getElementById("isbn");
        data.forEach(libro => {
            select.innerHTML += `<option value="${libro.isbn}">${libro.titulo} — ${libro.autor}</option>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al cargar libros.");
    }
}

async function registrarPrestamo() {
    try {
        const prestamo = {
            correo_cliente:    document.getElementById("correo_cliente").value,
            correo_empleado:   correoBibliotecario,
            isbn:              document.getElementById("isbn").value,
            cantidad:          document.getElementById("cantidad").value,
            dia_de_vencimiento:document.getElementById("dia_de_vencimiento").value
        };

        const response = await fetch("/prestamos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(prestamo)
        });

        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }

        mostrarMensaje(data.mensaje, "success");
        document.getElementById("correo_cliente").value = "";
        document.getElementById("isbn").value = "";
        document.getElementById("cantidad").value = "1";
        document.getElementById("dia_de_vencimiento").value = "";
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al registrar préstamo.");
    }
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
