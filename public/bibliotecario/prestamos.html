<!DOCTYPE html>
<!-- Archivo: bibliotecario/prestamos.html — Registro de préstamos de libros a clientes -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Préstamo — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<!-- Verificación de sesión bibliotecario -->
<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<!-- Encabezado de la página -->
<header class="page-header">
    <h1><i class="bi bi-box-arrow-up-right"></i> Registrar Préstamo</h1>
    <a href="/bibliotecario/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <div id="infoBibliotecario" class="panel-info"></div>

    <!-- Formulario de préstamo: cliente, libro, cantidad y fecha de vencimiento -->
    <div class="card">
        <h2>Datos del préstamo</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="correo_cliente">Cliente</label>
                <select id="correo_cliente">
                    <option value="">Selecciona un cliente</option>
                </select>
            </div>
            <div class="form-group" style="position:relative;">
                <label for="buscarLibro">Libro</label>
                <input type="text" id="buscarLibro" placeholder="Buscar por título, autor o ISBN..." autocomplete="off" oninput="buscarLibrosPrestamo()">
                <input type="hidden" id="isbn">
                <div id="resultadosLibro" style="display:none; position:absolute; top:100%; left:0; right:0; z-index:10; background:#fff; border:1px solid #e2e8f0; border-radius:8px; max-height:200px; overflow-y:auto; box-shadow:0 4px 12px rgba(0,0,0,.1);"></div>
            </div>
            <div class="form-group">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" min="1" value="1">
            </div>
            <div class="form-group">
                <label for="dia_de_vencimiento">Fecha de vencimiento</label>
                <input type="date" id="dia_de_vencimiento">
            </div>
        </div>

        <div class="form-actions">
            <button type="button" onclick="registrarPrestamo()">Registrar Préstamo</button>
        </div>
    </div>

</main>

<!-- Lógica de registro de préstamos -->
<script>
const correoBibliotecario = sessionStorage.getItem("correoBibliotecario");
const nombreBibliotecario = sessionStorage.getItem("nombreBibliotecario");
const rolBibliotecario    = sessionStorage.getItem("rolBibliotecario");

document.getElementById("infoBibliotecario").textContent =
    `Bibliotecario: ${nombreBibliotecario} (${rolBibliotecario})`;

window.onload = () => { cargarClientes(); };

// Carga la lista de clientes en el select
async function cargarClientes() {
    try {
        const response = await fetch("/clientes");
        const data = await response.json();
        const select = document.getElementById("correo_cliente");
        data.forEach(c => {
            select.innerHTML += `<option value="${c.correo_electronico}">${c.nombre} ${c.ap_paterno}</option>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al cargar clientes.");
    }
}

// Búsqueda de libros con autocompletado
let tempBusquedaLibro;

function buscarLibrosPrestamo() {
    clearTimeout(tempBusquedaLibro);
    tempBusquedaLibro = setTimeout(async () => {
        const texto = document.getElementById("buscarLibro").value.trim();
        const contenedor = document.getElementById("resultadosLibro");

        if (texto.length < 2) {
            contenedor.style.display = "none";
            return;
        }

        try {
            const res = await fetch(`/libros?buscar=${encodeURIComponent(texto)}`);
            const data = await res.json();
            contenedor.innerHTML = "";

            if (data.length === 0) {
                contenedor.innerHTML = '<div style="padding:10px 14px; color:#64748b; font-size:0.85rem;">No se encontraron libros</div>';
                contenedor.style.display = "block";
                return;
            }

            data.slice(0, 15).forEach(libro => {
                const item = document.createElement("div");
                item.style.cssText = "padding:10px 14px; cursor:pointer; border-bottom:1px solid #f1f5f9; font-size:0.9rem;";
                item.innerHTML = `<strong>${libro.titulo}</strong> <span style="color:#64748b;">— ${libro.autor}</span> <small style="color:#94a3b8;">(${libro.isbn})</small>`;
                item.onmouseover = () => item.style.background = "#f8f4f0";
                item.onmouseout = () => item.style.background = "#fff";
                item.onclick = () => {
                    document.getElementById("isbn").value = libro.isbn;
                    document.getElementById("buscarLibro").value = `${libro.titulo} — ${libro.autor}`;
                    contenedor.style.display = "none";
                };
                contenedor.appendChild(item);
            });

            contenedor.style.display = "block";
        } catch (e) {
            console.error(e);
        }
    }, 300);
}

// Cierra el dropdown al hacer clic fuera
document.addEventListener("click", (e) => {
    if (!e.target.closest("#buscarLibro") && !e.target.closest("#resultadosLibro")) {
        document.getElementById("resultadosLibro").style.display = "none";
    }
});

// Envía los datos del préstamo al servidor
async function registrarPrestamo() {
    try {
        const prestamo = {
            correo_cliente:    document.getElementById("correo_cliente").value,
            correo_empleado:   correoBibliotecario,
            isbn:              document.getElementById("isbn").value,
            cantidad:          document.getElementById("cantidad").value,
            dia_de_vencimiento:document.getElementById("dia_de_vencimiento").value
        };

        const response = await fetch("/prestamos", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(prestamo)
        });

        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }

        mostrarMensaje(data.mensaje, "success");
        document.getElementById("correo_cliente").value = "";
        document.getElementById("buscarLibro").value = "";
        document.getElementById("isbn").value = "";
        document.getElementById("cantidad").value = "1";
        document.getElementById("dia_de_vencimiento").value = "";
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al registrar préstamo.");
    }
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

<script src="/confirmar.js"></script><script src="/theme.js"></script></body>
</html>
