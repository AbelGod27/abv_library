<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Ventas — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<header class="page-header">
    <h1>📋 Historial de Ventas</h1>
    <a href="/bibliotecario/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <div id="infoBibliotecario" class="panel-info"></div>

    <div class="card">
        <h2>Ventas registradas</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID Venta</th>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Total</th>
                        <th>Método</th>
                        <th>Bibliotecario</th>
                    </tr>
                </thead>
                <tbody id="tablaVentas"></tbody>
            </table>
        </div>
    </div>

</main>

<script>
const nombreBibliotecario = sessionStorage.getItem("nombreBibliotecario");
const rolBibliotecario    = sessionStorage.getItem("rolBibliotecario");

document.getElementById("infoBibliotecario").textContent =
    `Sesión: ${nombreBibliotecario} (${rolBibliotecario})`;

window.onload = () => cargarVentas();

async function cargarVentas() {
    try {
        const response = await fetch("/ventas");
        const data = await response.json();
        const tabla = document.getElementById("tablaVentas");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">No hay ventas registradas</td></tr>`;
            return;
        }

        data.forEach(v => {
            tabla.innerHTML += `
                <tr>
                    <td>${v.id_venta}</td>
                    <td>${formatFecha(v.fecha)}</td>
                    <td>${v.hora ?? "—"}</td>
                    <td>$${v.total_pagado}</td>
                    <td>${v.metodo_de_pago}</td>
                    <td>${v.vendedor ?? "—"}</td>
                </tr>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al cargar ventas.");
    }
}

function formatFecha(fecha) {
    if (!fecha) return "—";
    return fecha.split("T")[0];
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
