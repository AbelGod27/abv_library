<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Ventas</title>
    <link rel="stylesheet" href="/principal.css">
</head>

<body>

<script>
if (
    sessionStorage.getItem(
        "bibliotecarioActivo"
    ) !== "true"
) {
    window.location.href =
        "/bibliotecario/login.html";
}
</script>

<h1>Historial de Ventas</h1>

<h2 id="infoBibliotecario"></h2>

<a href="/bibliotecario/panel.html">
    <button type="button">
        Regresar al panel
    </button>
</a>

<hr>

<table border="1">

    <thead>

        <tr>
            <th>ID Venta</th>
            <th>Fecha</th>
            <th>Hora</th>
            <th>Total</th>
            <th>Método</th>
            <th>Bibliotecario</th>
        </tr>

    </thead>

    <tbody id="tablaVentas"></tbody>

</table>

<script>

const nombreBibliotecario =
    sessionStorage.getItem(
        "nombreBibliotecario"
    );

const rolBibliotecario =
    sessionStorage.getItem(
        "rolBibliotecario"
    );

document.getElementById(
    "infoBibliotecario"
).textContent =
    `Sesión: ${nombreBibliotecario} (${rolBibliotecario})`;

window.onload = () => {
    cargarVentas();
};

async function cargarVentas() {

    try {

        const response =
            await fetch("/ventas");

        const data =
            await response.json();

        const tabla =
            document.getElementById(
                "tablaVentas"
            );

        tabla.innerHTML = "";

        if (data.length === 0) {

            tabla.innerHTML = `
                <tr>
                    <td colspan="6">
                        No hay ventas registradas
                    </td>
                </tr>
            `;

            return;

        }

        data.forEach(venta => {

            tabla.innerHTML += `
                <tr>
                    <td>${venta.id_venta}</td>
                    <td>${venta.fecha ?? ""}</td>
                    <td>${venta.hora ?? ""}</td>
                    <td>${venta.total_pagado}</td>
                    <td>${venta.metodo_de_pago}</td>
                    <td>${venta.vendedor ?? ""}</td>
                </tr>
            `;

        });

    }

    catch (error) {

        console.error(error);

        alert(
            "Error al cargar ventas."
        );

    }

}

</script>

</body>
</html>
