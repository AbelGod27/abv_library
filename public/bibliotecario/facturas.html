<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<header class="page-header">
    <h1>🧾 Facturas</h1>
    <a href="/bibliotecario/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <!-- FILTRO -->
    <div class="card">
        <h2>Generar reporte por fechas</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="fecha_inicio">Fecha inicio</label>
                <input type="date" id="fecha_inicio">
            </div>
            <div class="form-group">
                <label for="fecha_fin">Fecha fin</label>
                <input type="date" id="fecha_fin">
            </div>
        </div>
        <div class="form-actions">
            <button type="button" onclick="generarReporte()">Generar reporte</button>
        </div>
    </div>

    <!-- RESUMEN -->
    <div class="card" id="seccionResumen" style="display:none;">
        <h2>Resumen del periodo</h2>
        <div class="resumen-box" id="resumenFacturas"></div>
    </div>

    <!-- VENTAS -->
    <div class="card" id="seccionVentas" style="display:none;">
        <h2>Ventas realizadas</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID Venta</th>
                        <th>Fecha</th>
                        <th>Monto</th>
                        <th>Método de pago</th>
                    </tr>
                </thead>
                <tbody id="tablaVentas"></tbody>
            </table>
        </div>
    </div>

    <!-- PRÉSTAMOS -->
    <div class="card" id="seccionPrestamos" style="display:none;">
        <h2>Préstamos registrados</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID Préstamo</th>
                        <th>Fecha</th>
                        <th>Multa</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="tablaPrestamos"></tbody>
            </table>
        </div>
    </div>

</main>

<script>
async function generarReporte() {
    try {
        const fechaInicio = document.getElementById("fecha_inicio").value;
        const fechaFin    = document.getElementById("fecha_fin").value;

        if (!fechaInicio || !fechaFin) {
            mostrarMensaje("Selecciona ambas fechas.");
            return;
        }

        const response = await fetch(`/facturas?fecha_inicio=${fechaInicio}&fecha_fin=${fechaFin}`);
        const data = await response.json();

        if (data.error) { mostrarMensaje(data.error); return; }

        mostrarVentas(data.ventas);
        mostrarPrestamos(data.prestamos);
        mostrarResumen(data.ventas, data.prestamos);

        document.getElementById("seccionResumen").style.display = "block";
        document.getElementById("seccionVentas").style.display = "block";
        document.getElementById("seccionPrestamos").style.display = "block";
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al generar reporte.");
    }
}

function mostrarVentas(ventas) {
    const tabla = document.getElementById("tablaVentas");
    tabla.innerHTML = "";
    if (ventas.length === 0) {
        tabla.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">No hay ventas en este periodo</td></tr>`;
        return;
    }
    ventas.forEach(v => {
        tabla.innerHTML += `
            <tr>
                <td>${v.id}</td>
                <td>${formatFecha(v.fecha)}</td>
                <td>$${v.monto}</td>
                <td>${v.metodo_de_pago ?? "—"}</td>
            </tr>`;
    });
}

function mostrarPrestamos(prestamos) {
    const tabla = document.getElementById("tablaPrestamos");
    tabla.innerHTML = "";
    if (prestamos.length === 0) {
        tabla.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">No hay préstamos en este periodo</td></tr>`;
        return;
    }
    prestamos.forEach(p => {
        const estadoBadge = p.estado === "Devuelto"
            ? `<span class="badge badge-returned">Devuelto</span>`
            : `<span class="badge badge-pending">Pendiente</span>`;
        tabla.innerHTML += `
            <tr>
                <td>${p.id}</td>
                <td>${formatFecha(p.fecha)}</td>
                <td>$${p.monto}</td>
                <td>${estadoBadge}</td>
            </tr>`;
    });
}

function mostrarResumen(ventas, prestamos) {
    const totalVentas = ventas.reduce((t, v) => t + Number(v.monto || 0), 0);
    const totalMultas = prestamos.reduce((t, p) => t + Number(p.monto || 0), 0);
    const pendientes  = prestamos.filter(p => p.estado === "Pendiente").length;
    const devueltos   = prestamos.filter(p => p.estado === "Devuelto").length;

    document.getElementById("resumenFacturas").innerHTML = `
        <div class="resumen-item">
            <div class="label">Total ventas</div>
            <div class="value">$${totalVentas.toFixed(2)}</div>
        </div>
        <div class="resumen-item">
            <div class="label">Total multas</div>
            <div class="value">$${totalMultas.toFixed(2)}</div>
        </div>
        <div class="resumen-item">
            <div class="label">Préstamos pendientes</div>
            <div class="value">${pendientes}</div>
        </div>
        <div class="resumen-item">
            <div class="label">Préstamos devueltos</div>
            <div class="value">${devueltos}</div>
        </div>
        <div class="resumen-item">
            <div class="label">Total general</div>
            <div class="value" style="color:var(--color-success)">$${(totalVentas + totalMultas).toFixed(2)}</div>
        </div>
    `;
}

function formatFecha(fecha) {
    if (!fecha) return "—";
    return fecha.split("T")[0];
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
