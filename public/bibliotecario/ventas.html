<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Venta — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<header class="page-header">
    <h1>🛒 Registrar Venta</h1>
    <a href="/bibliotecario/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <div id="infoBibliotecario" class="panel-info"></div>

    <div class="card">
        <h2>Datos de la venta</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="isbn">Libro</label>
                <select id="isbn">
                    <option value="">Selecciona un libro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" min="1" value="1">
            </div>
            <div class="form-group">
                <label for="total_pagado">Total pagado ($)</label>
                <input type="number" id="total_pagado" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="metodo_de_pago">Método de pago</label>
                <select id="metodo_de_pago">
                    <option value="">Selecciona método</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Tarjeta">Tarjeta</option>
                    <option value="Transferencia">Transferencia</option>
                </select>
            </div>
            <div class="form-group">
                <label for="correo_cliente">Correo del cliente (opcional, para puntos)</label>
                <input type="email" id="correo_cliente" placeholder="cliente@correo.com" onblur="consultarPuntosCliente()">
            </div>
        </div>

        <!-- Sección de canje de puntos -->
        <div id="seccionCanje" class="form-group" style="display:none; margin-top:16px; padding:16px; background:#fef9f3; border-radius:8px; border:1px solid #e8d5c0;">
            <p style="margin:0 0 8px; font-weight:600; color:#a0784c;">⭐ Puntos disponibles: <span id="puntosDisponibles">0</span></p>
            <p style="margin:0 0 12px; font-size:0.85rem; color:#64748b;">10 puntos = $1 de descuento</p>
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <label for="puntos_canjear" style="font-size:0.9rem;">Puntos a canjear:</label>
                <input type="number" id="puntos_canjear" min="0" value="0" style="width:100px;" oninput="calcularDescuento()">
                <span id="descuentoTexto" style="font-weight:600; color:#16a34a;">Descuento: $0.00</span>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" onclick="registrarVenta()">Registrar Venta</button>
        </div>
    </div>

</main>

<script>
const correoBibliotecario = sessionStorage.getItem("correoBibliotecario");
const nombreBibliotecario = sessionStorage.getItem("nombreBibliotecario");
const rolBibliotecario    = sessionStorage.getItem("rolBibliotecario");

document.getElementById("infoBibliotecario").textContent =
    `Bibliotecario: ${nombreBibliotecario} (${rolBibliotecario})`;

window.onload = () => cargarLibros();

async function cargarLibros() {
    try {
        const response = await fetch("/libros");
        const data = await response.json();
        const select = document.getElementById("isbn");
        data.forEach(libro => {
            select.innerHTML += `<option value="${libro.isbn}">${libro.titulo} — ${libro.autor}</option>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al cargar libros.");
    }
}

let puntosClienteActual = 0;

async function consultarPuntosCliente() {
    const correo = document.getElementById("correo_cliente").value.trim();
    const seccion = document.getElementById("seccionCanje");

    if (!correo) {
        seccion.style.display = "none";
        puntosClienteActual = 0;
        return;
    }

    try {
        const res = await fetch(`/puntos/${encodeURIComponent(correo)}`);
        const data = await res.json();

        if (data.error) {
            seccion.style.display = "none";
            puntosClienteActual = 0;
            return;
        }

        puntosClienteActual = data.puntos || 0;
        document.getElementById("puntosDisponibles").textContent = puntosClienteActual;
        document.getElementById("puntos_canjear").max = puntosClienteActual;
        document.getElementById("puntos_canjear").value = 0;
        document.getElementById("descuentoTexto").textContent = "Descuento: $0.00";
        seccion.style.display = "block";
    } catch (e) {
        seccion.style.display = "none";
        puntosClienteActual = 0;
    }
}

function calcularDescuento() {
    let puntos = parseInt(document.getElementById("puntos_canjear").value) || 0;
    if (puntos > puntosClienteActual) {
        puntos = puntosClienteActual;
        document.getElementById("puntos_canjear").value = puntos;
    }
    if (puntos < 0) {
        puntos = 0;
        document.getElementById("puntos_canjear").value = 0;
    }
    const descuento = (puntos / 10).toFixed(2);
    document.getElementById("descuentoTexto").textContent = `Descuento: $${descuento}`;
}

async function registrarVenta() {
    try {
        const correoCliente = document.getElementById("correo_cliente").value.trim();
        const puntosACanjear = parseInt(document.getElementById("puntos_canjear").value) || 0;

        // Si hay puntos a canjear, primero canjearlos
        let descuentoAplicado = 0;
        if (correoCliente && puntosACanjear > 0) {
            const resCanje = await fetch("/puntos/canjear", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    correo_cliente: correoCliente,
                    puntos_a_canjear: puntosACanjear
                })
            });

            const dataCanje = await resCanje.json();
            if (dataCanje.error) {
                mostrarMensaje(dataCanje.error);
                return;
            }
            descuentoAplicado = dataCanje.descuento;
        }

        const totalOriginal = parseFloat(document.getElementById("total_pagado").value) || 0;
        const totalFinal = Math.max(0, totalOriginal - descuentoAplicado);

        const venta = {
            correo_electronico: correoBibliotecario,
            isbn:               document.getElementById("isbn").value,
            cantidad:           document.getElementById("cantidad").value,
            total_pagado:       totalFinal.toFixed(2),
            metodo_de_pago:     document.getElementById("metodo_de_pago").value,
            correo_cliente:     correoCliente || undefined
        };

        const response = await fetch("/ventas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(venta)
        });

        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }

        let msg = data.mensaje;
        if (descuentoAplicado > 0) {
            msg += ` Descuento por puntos: -$${descuentoAplicado.toFixed(2)}.`;
        }
        if (data.puntos_ganados > 0) {
            msg += ` El cliente ganó ${data.puntos_ganados} punto(s) nuevo(s).`;
        }

        mostrarMensaje(msg, "success");
        document.getElementById("isbn").value = "";
        document.getElementById("cantidad").value = "1";
        document.getElementById("total_pagado").value = "";
        document.getElementById("metodo_de_pago").value = "";
        document.getElementById("correo_cliente").value = "";
        document.getElementById("puntos_canjear").value = "0";
        document.getElementById("seccionCanje").style.display = "none";
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al registrar venta.");
    }
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
