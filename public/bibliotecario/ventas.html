<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Venta — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("bibliotecarioActivo") !== "true") {
    window.location.href = "/bibliotecario/login.html";
}
</script>

<header class="page-header">
    <h1>🛒 Registrar Venta</h1>
    <a href="/bibliotecario/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <div id="infoBibliotecario" class="panel-info"></div>

    <div class="card">
        <h2>Datos de la venta</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="isbn">Libro</label>
                <select id="isbn">
                    <option value="">Selecciona un libro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="cantidad">Cantidad</label>
                <input type="number" id="cantidad" min="1" value="1">
            </div>
            <div class="form-group">
                <label for="total_pagado">Total pagado ($)</label>
                <input type="number" id="total_pagado" step="0.01" min="0" placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="metodo_de_pago">Método de pago</label>
                <select id="metodo_de_pago">
                    <option value="">Selecciona método</option>
                    <option value="Efectivo">Efectivo</option>
                    <option value="Tarjeta">Tarjeta</option>
                    <option value="Transferencia">Transferencia</option>
                </select>
            </div>
        </div>

        <div class="form-actions">
            <button type="button" onclick="registrarVenta()">Registrar Venta</button>
        </div>
    </div>

</main>

<script>
const correoBibliotecario = sessionStorage.getItem("correoBibliotecario");
const nombreBibliotecario = sessionStorage.getItem("nombreBibliotecario");
const rolBibliotecario    = sessionStorage.getItem("rolBibliotecario");

document.getElementById("infoBibliotecario").textContent =
    `Bibliotecario: ${nombreBibliotecario} (${rolBibliotecario})`;

window.onload = () => cargarLibros();

async function cargarLibros() {
    try {
        const response = await fetch("/libros");
        const data = await response.json();
        const select = document.getElementById("isbn");
        data.forEach(libro => {
            select.innerHTML += `<option value="${libro.isbn}">${libro.titulo} — ${libro.autor}</option>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al cargar libros.");
    }
}

async function registrarVenta() {
    try {
        const venta = {
            correo_electronico: correoBibliotecario,
            isbn:               document.getElementById("isbn").value,
            cantidad:           document.getElementById("cantidad").value,
            total_pagado:       document.getElementById("total_pagado").value,
            metodo_de_pago:     document.getElementById("metodo_de_pago").value
        };

        const response = await fetch("/ventas", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(venta)
        });

        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }

        mostrarMensaje(data.mensaje, "success");
        document.getElementById("isbn").value = "";
        document.getElementById("cantidad").value = "1";
        document.getElementById("total_pagado").value = "";
        document.getElementById("metodo_de_pago").value = "";
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al registrar venta.");
    }
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
