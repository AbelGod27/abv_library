<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Vendedor</title>
    <link rel="stylesheet" href="/principal.css">
</head>

<body>

<h1>Acceso Vendedor</h1>

<input
    type="email"
    id="correoVendedor"
    placeholder="Correo electrónico"
>

<br><br>

<button type="button" onclick="loginVendedor()">
    Entrar
</button>

<br><br>

<a href="/index.html">
    <button type="button">Regresar</button>
</a>

<script>
async function loginVendedor() {
    try {
        const correo = document.getElementById("correoVendedor").value;

        if (!correo) {
            alert("Ingresa un correo.");
            return;
        }

        const response = await fetch("/login-vendedor", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                correo_electronico: correo
            })
        });

        const data = await response.json();

        if (data.acceso) {
            sessionStorage.setItem("vendedorActivo", "true");
            sessionStorage.setItem("correoVendedor", correo);
            sessionStorage.setItem("nombreVendedor", data.empleado.nombre);
            sessionStorage.setItem("rolVendedor", data.empleado.rol);

            window.location.href = "/vendedor/panel.html";
        } else {
            alert(data.error);
        }

    } catch (error) {
        console.error(error);
        alert("Error al iniciar sesión.");
    }
}
</script>

</body>
</html>
