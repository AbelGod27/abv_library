<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — ABV Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">

        <div class="logo"><i class="bi bi-book" style="font-size:2.5rem;"></i></div>
        <h1>Iniciar sesión</h1>
        <p>Ingresa tus credenciales para acceder</p>

        <p id="mensaje" class="mensaje"></p>

        <!-- PASO 1: Correo y contraseña -->
        <div id="paso1">
            <div class="form-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') iniciarSesion()">
            </div>

            <button type="button" class="btn-login" onclick="iniciarSesion()">Ingresar</button>
        </div>

        <!-- PASO 2: Elegir rol (si tiene varios) -->
        <div id="paso2" style="display:none;">
            <p style="font-weight:500; margin-bottom:16px;">Hola, <span id="nombreUsuario"></span>. Elige cómo quieres entrar:</p>
            <div id="opcionesRol" style="display:flex; flex-direction:column; gap:12px;"></div>
            <button type="button" class="btn-secondary" style="margin-top:16px; width:100%;" onclick="volverPaso1()">Cancelar</button>
        </div>

        <div class="back-link" style="margin-top:20px;">
            ¿No tienes cuenta? <a href="/cliente/registro.html">Regístrate como cliente</a>
        </div>
        <div class="back-link">
            <a href="/">← Volver al inicio</a>
        </div>

    </div>
</div>

<script>
let datosLogin = null;

async function iniciarSesion() {
    const correo = document.getElementById("correo").value.trim();
    const password = document.getElementById("password").value;

    if (!correo || !password) {
        mostrarMensaje("Ingresa correo y contraseña.");
        return;
    }

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ correo_electronico: correo, password })
        });

        const data = await res.json();

        if (data.error) {
            mostrarMensaje(data.error);
            return;
        }

        datosLogin = data;

        // Si solo tiene un rol, redirigir directamente
        if (data.roles.length === 1) {
            redirigirPorRol(data.roles[0], data);
            return;
        }

        // Si tiene varios roles, mostrar opciones
        document.getElementById("paso1").style.display = "none";
        document.getElementById("paso2").style.display = "block";
        document.getElementById("nombreUsuario").textContent = data.nombre;

        const contenedor = document.getElementById("opcionesRol");
        contenedor.innerHTML = "";

        const iconos = {
            admin: "bi-shield-lock",
            bibliotecario: "bi-journal-bookmark",
            cliente: "bi-person"
        };

        data.roles.forEach(rol => {
            const btn = document.createElement("button");
            btn.className = "btn-login";
            btn.style.cssText = "display:flex; align-items:center; justify-content:center; gap:10px;";
            btn.innerHTML = `<i class="bi ${iconos[rol.tipo] || 'bi-person'}"></i> Entrar como ${rol.label}`;
            btn.onclick = () => redirigirPorRol(rol, datosLogin);
            contenedor.appendChild(btn);
        });

    } catch (e) {
        mostrarMensaje("Error de conexión con el servidor.");
    }
}

function redirigirPorRol(rol, data) {
    if (rol.tipo === "admin") {
        sessionStorage.setItem("adminActivo", "true");
        window.location.href = "/admin/panel.html";

    } else if (rol.tipo === "bibliotecario") {
        sessionStorage.setItem("bibliotecarioActivo", "true");
        sessionStorage.setItem("correoBibliotecario", data.correo_electronico);
        sessionStorage.setItem("nombreBibliotecario", data.nombre);
        sessionStorage.setItem("rolBibliotecario", rol.rol);
        window.location.href = "/bibliotecario/panel.html";

    } else if (rol.tipo === "cliente") {
        localStorage.setItem("cliente", JSON.stringify({
            correo_electronico: data.correo_electronico,
            nombre: data.nombre,
            ap_paterno: data.ap_paterno
        }));
        window.location.href = "/cliente/cliente.html";
    }
}

function volverPaso1() {
    document.getElementById("paso1").style.display = "block";
    document.getElementById("paso2").style.display = "none";
    datosLogin = null;
}

function mostrarMensaje(texto, tipo = "error") {
    const el = document.getElementById("mensaje");
    el.textContent = texto;
    el.className = "mensaje mostrar " + tipo;
    setTimeout(() => {
        el.className = "mensaje";
        el.textContent = "";
    }, 4000);
}
</script>

</body>
</html>
