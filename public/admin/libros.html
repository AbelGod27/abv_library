<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Libros — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("adminActivo") !== "true") {
    window.location.href = "/admin/login.html";
}
</script>

<header class="page-header">
    <h1><i class="bi bi-book"></i> Gestión de Libros</h1>
    <a href="/admin/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <!-- FORMULARIO -->
    <div class="card">
        <h2 id="formTitulo">Agregar Libro</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="isbn">ISBN</label>
                <input type="text" id="isbn" placeholder="978-...">
            </div>
            <div class="form-group">
                <label for="titulo">Título</label>
                <input type="text" id="titulo" placeholder="Título del libro">
            </div>
            <div class="form-group">
                <label for="autor">Autor</label>
                <input type="text" id="autor" placeholder="Nombre del autor">
            </div>
            <div class="form-group">
                <label for="editorial">Editorial</label>
                <input type="text" id="editorial" placeholder="Editorial">
            </div>
            <div class="form-group">
                <label for="version">Versión</label>
                <input type="text" id="version" placeholder="Ej: 1ra edición">
            </div>
            <div class="form-group">
                <label for="anio_publicacion">Año de publicación</label>
                <input type="date" id="anio_publicacion">
            </div>
            <div class="form-group">
                <label for="precio">Precio ($)</label>
                <input type="number" id="precio" step="0.01" min="0" placeholder="0.00">
            </div>
        </div>

        <div class="form-actions">
            <button type="button" id="btnAgregarLibro" onclick="agregarLibro()">Agregar Libro</button>
            <button type="button" id="btnActualizarLibro" onclick="actualizarLibro()" style="display:none;">Guardar Cambios</button>
            <button type="button" id="btnCancelarEdicion" class="btn-secondary" onclick="cancelarEdicion()" style="display:none;">Cancelar</button>
        </div>
    </div>

    <!-- IMPORTAR DESDE OPEN LIBRARY -->
    <div class="card">
        <h2><i class="bi bi-cloud-download"></i> Importar desde Open Library</h2>
        <p style="color:#64748b; margin-bottom:16px; font-size:0.9rem;">
            Busca libros en Open Library e impórtalos a tu base de datos local. Se importan hasta 50 libros que tengan ISBN.
        </p>

        <div class="form-grid">
            <div class="form-group">
                <label for="buscarImportar">Término de búsqueda</label>
                <input type="text" id="buscarImportar" placeholder="Ej: science fiction, Gabriel García Márquez...">
            </div>
        </div>

        <div class="form-actions">
            <button type="button" onclick="importarOpenLibrary()">Importar Libros</button>
        </div>
    </div>

    <!-- LISTA -->
    <div class="card">
        <h2>Lista de Libros</h2>

        <div class="search-bar">
            <input type="text" id="buscarLibro" placeholder="Buscar por título, autor, ISBN...">
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Título / Autor</th>
                        <th>ISBN</th>
                        <th>Precio</th>
                        <th>Venta</th>
                        <th>Préstamo</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaLibros"></tbody>
            </table>
        </div>
        <div class="tabla-paginacion" id="paginacionLibros"></div>
    </div>

</main>

<script>
const inputBusqueda = document.getElementById("buscarLibro");
let temporizador;

window.onload = () => cargarLibros("");

inputBusqueda.addEventListener("input", () => {
    clearTimeout(temporizador);
    temporizador = setTimeout(() => cargarLibros(inputBusqueda.value), 500);
});

let paginaActual = 1;
const FILAS_POR_PAGINA = 15;
let datosLibros = [];

async function cargarLibros(busqueda) {
    try {
        const response = await fetch(`/stock`);
        const allData = await response.json();

        datosLibros = busqueda
            ? allData.filter(l =>
                l.isbn.toLowerCase().includes(busqueda.toLowerCase()) ||
                l.titulo.toLowerCase().includes(busqueda.toLowerCase()) ||
                l.autor.toLowerCase().includes(busqueda.toLowerCase())
            )
            : allData;

        paginaActual = 1;
        renderPaginaLibros();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al consultar libros.");
    }
}

function renderPaginaLibros() {
    const tabla = document.getElementById("tablaLibros");
    tabla.innerHTML = "";

    const totalPaginas = Math.ceil(datosLibros.length / FILAS_POR_PAGINA);
    const inicio = (paginaActual - 1) * FILAS_POR_PAGINA;
    const fin = inicio + FILAS_POR_PAGINA;
    const pagina = datosLibros.slice(inicio, fin);

    if (datosLibros.length === 0) {
        tabla.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--text-muted)">No se encontraron libros</td></tr>`;
        document.getElementById("paginacionLibros").innerHTML = "";
        return;
    }

    pagina.forEach(libro => {
        const svStyle = Number(libro.stock_venta) === 0 ? "color:#dc2626; font-weight:600;" : "color:#16a34a; font-weight:600;";
        const spStyle = Number(libro.stock_prestamo) === 0 ? "color:#dc2626; font-weight:600;" : "color:#16a34a; font-weight:600;";

        tabla.innerHTML += `
            <tr>
                <td>
                    <strong>${libro.titulo}</strong><br>
                    <small style="color:#64748b;">${libro.autor}</small>
                    ${libro.editorial ? `<br><small style="color:#94a3b8;">${libro.editorial} ${libro.version ? '· ' + libro.version : ''}</small>` : ''}
                </td>
                <td><span style="font-family:'Montserrat',sans-serif; font-size:.8rem; font-weight:500; background:#f1f5f9; padding:2px 6px; border-radius:4px;">${libro.isbn}</span></td>
                <td style="font-weight:600;">$${Number(libro.precio || 0).toFixed(2)}</td>
                <td style="${svStyle}">${libro.stock_venta}</td>
                <td style="${spStyle}">${libro.stock_prestamo}</td>
                <td>
                    <div class="td-actions">
                        <button class="btn-secondary btn-sm" type="button"
                            onclick="cargarDatosEditar('${libro.isbn}','${libro.titulo}','${libro.autor}','${libro.editorial ?? ""}','${libro.version ?? ""}','${libro.anio_publicacion ?? ""}','${libro.precio ?? 0}')">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn-danger btn-sm" type="button" onclick="eliminarLibro('${libro.isbn}')">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>`;
    });

    // Paginación
    document.getElementById("paginacionLibros").innerHTML = `
        <button onclick="cambiarPagina(-1)" ${paginaActual <= 1 ? 'disabled' : ''}>← Anterior</button>
        <span>Página ${paginaActual} de ${totalPaginas} (${datosLibros.length} libros)</span>
        <button onclick="cambiarPagina(1)" ${paginaActual >= totalPaginas ? 'disabled' : ''}>Siguiente →</button>
    `;
}

function cambiarPagina(dir) {
    paginaActual += dir;
    renderPaginaLibros();
}

async function agregarLibro() {
    try {
        const libro = obtenerDatosLibro();
        const response = await fetch("/libros", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(libro)
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        limpiarFormulario();
        cargarLibros("");
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al agregar libro.");
    }
}

async function eliminarLibro(isbn) {
    if (!confirm("¿Seguro que quieres eliminar este libro?")) return;
    try {
        const response = await fetch(`/libros/${isbn}`, { method: "DELETE" });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        cargarLibros("");
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al eliminar libro.");
    }
}

function cargarDatosEditar(isbn, titulo, autor, editorial, version, anio_publicacion, precio) {
    document.getElementById("isbn").value = isbn;
    document.getElementById("titulo").value = titulo;
    document.getElementById("autor").value = autor;
    document.getElementById("editorial").value = editorial;
    document.getElementById("version").value = version;
    document.getElementById("anio_publicacion").value = anio_publicacion?.split("T")[0] || "";
    document.getElementById("precio").value = precio || "";
    document.getElementById("isbn").disabled = true;
    document.getElementById("formTitulo").textContent = "Editar Libro";
    document.getElementById("btnAgregarLibro").style.display = "none";
    document.getElementById("btnActualizarLibro").style.display = "inline-flex";
    document.getElementById("btnCancelarEdicion").style.display = "inline-flex";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

async function actualizarLibro() {
    try {
        const isbn = document.getElementById("isbn").value;
        const libro = obtenerDatosLibro();
        const response = await fetch(`/libros/${isbn}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(libro)
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        limpiarFormulario();
        cargarLibros("");
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al actualizar libro.");
    }
}

function cancelarEdicion() { limpiarFormulario(); }

function obtenerDatosLibro() {
    return {
        isbn:             document.getElementById("isbn").value,
        titulo:           document.getElementById("titulo").value,
        autor:            document.getElementById("autor").value,
        editorial:        document.getElementById("editorial").value,
        version:          document.getElementById("version").value,
        anio_publicacion: document.getElementById("anio_publicacion").value,
        precio:           document.getElementById("precio").value || 0
    };
}

function limpiarFormulario() {
    ["isbn","titulo","autor","editorial","version","anio_publicacion","precio"].forEach(id => {
        document.getElementById(id).value = "";
    });
    document.getElementById("isbn").disabled = false;
    document.getElementById("formTitulo").textContent = "Agregar Libro";
    document.getElementById("btnAgregarLibro").style.display = "inline-flex";
    document.getElementById("btnActualizarLibro").style.display = "none";
    document.getElementById("btnCancelarEdicion").style.display = "none";
}

function formatFecha(fecha) {
    if (!fecha) return "—";
    return fecha.split("T")[0];
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}

async function importarOpenLibrary() {
    const buscar = document.getElementById("buscarImportar").value.trim();
    if (!buscar) {
        mostrarMensaje("Ingresa un término de búsqueda para importar.");
        return;
    }

    mostrarMensaje("Importando libros, espera...", "success");

    try {
        const response = await fetch("/libros/importar-openlibrary", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ buscar })
        });

        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }

        mostrarMensaje(data.mensaje, "success");
        document.getElementById("buscarImportar").value = "";
        cargarLibros("");
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al importar libros.");
    }
}
</script>

<script src="/theme.js"></script></body>
</html>
