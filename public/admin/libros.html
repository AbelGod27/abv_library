<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Gestión de Libros
    </title>
    <link rel="stylesheet" href="/principal.css">
</head>

<body>
    <script>
        if (sessionStorage.getItem("adminActivo") !== "true") {
            window.location.href = "/admin/login.html";
        }
    </script>

    <h1>
        Gestión de Libros
    </h1>
    <p id="mensaje" class="mensaje"></p>

    <a href="/admin/panel.html">

        <button>
            Regresar al panel
        </button>

    </a>

    <hr>

    <h2>
        Agregar Libro
    </h2>

    <input type="text" id="isbn" placeholder="ISBN">

    <input type="text" id="titulo" placeholder="Título">

    <input type="text" id="autor" placeholder="Autor">

    <input type="text" id="editorial" placeholder="Editorial">

    <input type="text" id="version" placeholder="Versión">

    <label for="anio_publicacion">
        Año de publicación
    </label>

    <input type="date" id="anio_publicacion">

    <br><br>

    <button type="button" id="btnAgregarLibro" onclick="agregarLibro()">
        Agregar Libro
    </button>

    <button type="button" id="btnActualizarLibro" onclick="actualizarLibro()" style="display:none;">
        Actualizar Libro
    </button>

    <hr>

    <h2>
        Lista de Libros
    </h2>

    <input type="text" id="buscarLibro" placeholder="Buscar libro...">

    <br><br>

    <table border="1">

        <thead>
            <tr>
                <th>ISBN</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Editorial</th>
                <th>Versión</th>
                <th>Año</th>
                <th>Acción</th>
            </tr>
        </thead>

        <tbody id="tablaLibros"></tbody>

    </table>

<script>

const inputBusqueda =
    document.getElementById("buscarLibro");

let temporizador;

window.onload = () => {
    cargarLibros("");
};

inputBusqueda.addEventListener("input", () => {

    clearTimeout(temporizador);
    temporizador = setTimeout(() => {
        cargarLibros(
            inputBusqueda.value
        );
    }, 500);

});


// =========================
// CONSULTAR LIBROS
// =========================

async function cargarLibros(busqueda) {
    try {
        const response = await fetch(
            `/libros?buscar=${encodeURIComponent(busqueda)}`
        );

        const data =
            await response.json();

        const tabla =
            document.getElementById(
                "tablaLibros"
            );

        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `
                <tr>
                    <td colspan="6">
                        No se encontraron libros
                    </td>
                </tr>
            `;

            return;
        }

        data.forEach(libro => {

            tabla.innerHTML += `
        <tr>
            <td>${libro.isbn}</td>
            <td>${libro.titulo}</td>
            <td>${libro.autor}</td>
            <td>${libro.editorial ?? ""}</td>
            <td>${libro.version ?? ""}</td>
            <td>${libro.anio_publicacion ?? ""}</td>
            <td>
                <button type="button" onclick="cargarDatosEditar('${libro.isbn}', '${libro.titulo}', '${libro.autor}', '${libro.editorial ?? ""}', '${libro.version ?? ""}', '${libro.anio_publicacion ?? ""}')">
                    Editar
                </button>

                <button type="button" onclick="eliminarLibro('${libro.isbn}')">
                    Eliminar
                </button>
            </td>
        </tr>
    `;
        });
    }

    catch (error) {
        console.error(error);
        mostrarMensaje("Error al consultar libros.");
    }
}


// =========================
// AGREGAR LIBRO
// =========================

async function agregarLibro() {
    try {
        const libro = {
            isbn:
                document.getElementById(
                    "isbn"
                ).value,

            titulo:
                document.getElementById(
                    "titulo"
                ).value,

            autor:
                document.getElementById(
                    "autor"
                ).value,

            editorial:
                document.getElementById(
                    "editorial"
                ).value,

            version:
                document.getElementById(
                    "version"
                ).value,

            anio_publicacion:
                document.getElementById(
                    "anio_publicacion"
                ).value

        };

        const response = await fetch(
            "/libros",
            {
                method: "POST",
                headers: {
                    "Content-Type":
                        "application/json"
                },
                body:
                    JSON.stringify(libro)
            }
        );
        const data = await response.json();

        if (data.error) {
            mostrarMensaje(data.error);
            return;
        }

        mostrarMensaje(data.mensaje, "success");

        document.getElementById(
            "isbn"
        ).value = "";

        document.getElementById(
            "titulo"
        ).value = "";

        document.getElementById(
            "autor"
        ).value = "";

        document.getElementById(
            "editorial"
        ).value = "";

        document.getElementById(
            "version"
        ).value = "";

        document.getElementById(
            "anio_publicacion"
        ).value = "";

        cargarLibros("");
    }

    catch (error) {
        console.error(error);
        mostrarMensaje("Error al agregar libro.");
    }
}

async function eliminarLibro(isbn) {
    try {
        const confirmar = confirm(
            "¿Seguro que quieres eliminar este libro?"
        );

        if (!confirmar) {
            return;
        }

        const response = await fetch(`/libros/${isbn}`, {
            method: "DELETE"
        });

        const data = await response.json();

        if (data.error) {
            mostrarMensaje(data.error);
            return;
        }

        mostrarMensaje(data.mensaje, "success");

        cargarLibros("");

    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al eliminar libro.");
    }
}

function cargarDatosEditar(isbn, titulo, autor, editorial, version, anio_publicacion) {
    document.getElementById("isbn").value = isbn;
    document.getElementById("titulo").value = titulo;
    document.getElementById("autor").value = autor;
    document.getElementById("editorial").value = editorial;
    document.getElementById("version").value = version;
    document.getElementById("anio_publicacion").value = anio_publicacion?.split("T")[0] || "";

    document.getElementById("isbn").disabled = true;

    document.getElementById("btnAgregarLibro").style.display = "none";
    document.getElementById("btnActualizarLibro").style.display = "inline-block";
}

async function actualizarLibro() {
    try {
        const isbn = document.getElementById("isbn").value;

        const libro = {
            titulo: document.getElementById("titulo").value,
            autor: document.getElementById("autor").value,
            editorial: document.getElementById("editorial").value,
            version: document.getElementById("version").value,
            anio_publicacion: document.getElementById("anio_publicacion").value
        };

        const response = await fetch(`/libros/${isbn}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(libro)
        });

        const data = await response.json();

        if (data.error) {
            mostrarMensaje(data.error);
            return;
        }

        mostrarMensaje(data.mensaje, "success");

        document.getElementById("isbn").disabled = false;
        document.getElementById("isbn").value = "";
        document.getElementById("titulo").value = "";
        document.getElementById("autor").value = "";
        document.getElementById("editorial").value = "";
        document.getElementById("version").value = "";
        document.getElementById("anio_publicacion").value = "";

        document.getElementById("btnAgregarLibro").style.display = "inline-block";
        document.getElementById("btnActualizarLibro").style.display = "none";

        cargarLibros("");

    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al actualizar libro.");
    }
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje ${tipo}`;
}

</script>
</body>
</html>
