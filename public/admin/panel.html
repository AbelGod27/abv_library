<!DOCTYPE html>
<!-- Archivo: admin/panel.html — Panel principal del administrador con accesos a gestión -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<!-- Verificación de sesión: redirige si no hay sesión activa de admin -->
<script>
if (sessionStorage.getItem("adminActivo") !== "true") {
    window.location.href = "/admin/login.html";
}
</script>

<!-- Encabezado con título y botones de navegación -->
<header class="page-header">
    <h1><i class="bi bi-shield-lock"></i> Panel de Administrador</h1>
    <div style="display:flex; gap:8px;">
        <button class="btn-secondary btn-sm" onclick="cambiarARol('bibliotecario')"><i class="bi bi-arrow-left-right"></i> Ir a Bibliotecario</button>
        <button class="btn-secondary btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
    </div>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <!-- Grid de tarjetas con accesos directos a cada módulo de gestión -->
    <div class="panel-grid">

        <a href="/admin/libros.html" class="panel-card">
            <div class="icon"><i class="bi bi-book"></i></div>
            <span>Gestionar Libros</span>
            <button>Abrir</button>
        </a>

        <a href="/admin/proveedores.html" class="panel-card">
            <div class="icon"><i class="bi bi-building"></i></div>
            <span>Gestionar Proveedores</span>
            <button>Abrir</button>
        </a>

        <a href="/admin/empleados.html" class="panel-card">
            <div class="icon"><i class="bi bi-person-badge"></i></div>
            <span>Gestionar Empleados</span>
            <button>Abrir</button>
        </a>

        <a href="/admin/clientes.html" class="panel-card">
            <div class="icon"><i class="bi bi-people"></i></div>
            <span>Gestionar Clientes</span>
            <button>Abrir</button>
        </a>

    </div>

</main>

<!-- Lógica del panel de administrador -->
<script>
// Cierra la sesión del admin y redirige al inicio
function cerrarSesion() {
    sessionStorage.removeItem("adminActivo");
    window.location.href = "/index.html";
}

// Permite al admin cambiar al rol de bibliotecario sin re-login
function cambiarARol(rol) {
    if (rol === "bibliotecario") {
        sessionStorage.setItem("bibliotecarioActivo", "true");
        if (!sessionStorage.getItem("correoBibliotecario")) {
            sessionStorage.setItem("correoBibliotecario", "admin");
            sessionStorage.setItem("nombreBibliotecario", "Administrador");
            sessionStorage.setItem("rolBibliotecario", "Administrador");
        }
        window.location.href = "/bibliotecario/panel.html";
    }
}

// Muestra un mensaje temporal al usuario
function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

<script src="/confirmar.js"></script><script src="/theme.js"></script></body>
</html>
