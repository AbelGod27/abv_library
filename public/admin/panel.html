<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

    <h1>Panel de Administrador</h1>
    <p id="mensaje" class="mensaje"></p>

    <a href="/admin/libros.html">
        <button>Gestionar Libros</button>
    </a>

    <a href="/admin/proveedores.html">
        <button>Gestionar Proveedores</button>
    </a>

    <a href="/admin/empleados.html">
        <button>Gestionar Empleados</button>
    </a>

    <a href="/admin/clientes.html">
        <button type="button">Gestionar Clientes</button>
    </a>

    <br><br>

    <button onclick="cerrarSesion()">Cerrar sesión</button>

<script>
if (sessionStorage.getItem("adminActivo") !== "true") {
    window.location.href = "/admin/login.html";
}

function cerrarSesion() {
    sessionStorage.removeItem("adminActivo");
    window.location.href = "/index.html";
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje ${tipo}`;
}
</script>

</body>
</html>
