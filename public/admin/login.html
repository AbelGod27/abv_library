<!DOCTYPE html>
<!-- Archivo: admin/login.html — Página de login exclusiva para el administrador -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrador — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">

        <div class="logo"><i class="bi bi-shield-lock" style="font-size:2.5rem;"></i></div>
        <h1>Acceso Administrador</h1>
        <p>Ingresa tu contraseña para continuar</p>

        <p id="mensaje" class="mensaje"></p>

        <!-- Formulario: solo contraseña para acceso admin -->
        <div class="form-group">
            <label for="passwordAdmin">Contraseña</label>
            <div style="position:relative;">
                <input type="password" id="passwordAdmin" placeholder="••••••••" autocomplete="current-password" style="padding-right:40px;">
                <button type="button" onclick="togglePass('passwordAdmin', this)" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; box-shadow:none; min-width:auto; color:#64748b;">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button type="button" class="btn-login" onclick="loginAdmin()">Ingresar</button>

        <p class="back-link">¿No eres admin? <a href="/index.html">Volver al inicio</a></p>

    </div>
</div>

<!-- Lógica de autenticación del administrador -->
<script>
// Envía la contraseña al endpoint de login admin
async function loginAdmin() {
    try {
        const password = document.getElementById("passwordAdmin").value;
        const response = await fetch("/login-admin", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password })
        });

        const data = await response.json();

        if (data.acceso) {
            sessionStorage.setItem("adminActivo", "true");
            window.location.href = "/admin/panel.html";
        } else {
            mostrarMensaje(data.error);
        }
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al iniciar sesión");
    }
}

// Permite login con Enter
document.getElementById("passwordAdmin").addEventListener("keydown", e => {
    if (e.key === "Enter") loginAdmin();
});

// Alterna visibilidad de la contraseña
function togglePass(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { input.type = 'password'; icon.className = 'bi bi-eye'; }
}

// Muestra un mensaje temporal al usuario
function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

<script src="/confirmar.js"></script><script src="/theme.js"></script></body>
</html>
