<!DOCTYPE html>
<!-- Archivo: admin/clientes.html — Gestión CRUD de clientes y asignación de contraseñas -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<!-- Verificación de sesión admin -->
<script>
if (sessionStorage.getItem("adminActivo") !== "true") {
    window.location.href = "/admin/login.html";
}
</script>

<!-- Encabezado de la página -->
<header class="page-header">
    <h1><i class="bi bi-people"></i> Gestión de Clientes</h1>
    <a href="/admin/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <!-- Formulario para agregar/editar cliente -->
    <div class="card">
        <h2 id="formTitulo">Agregar Cliente</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="correo_electronico">Correo electrónico</label>
                <input type="email" id="correo_electronico" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label for="ap_paterno">Apellido paterno</label>
                <input type="text" id="ap_paterno" placeholder="Apellido paterno">
            </div>
            <div class="form-group">
                <label for="ap_materno">Apellido materno</label>
                <input type="text" id="ap_materno" placeholder="Apellido materno">
            </div>
            <div class="form-group">
                <label for="fecha_de_nacimiento">Fecha de nacimiento</label>
                <input type="date" id="fecha_de_nacimiento">
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" placeholder="10 dígitos">
            </div>
        </div>

        <div class="form-actions">
            <button type="button" id="btnAgregarCliente" onclick="agregarCliente()">Agregar Cliente</button>
            <button type="button" id="btnActualizarCliente" onclick="actualizarCliente()" style="display:none;">Guardar Cambios</button>
            <button type="button" id="btnCancelar" class="btn-secondary" onclick="limpiarFormularioCliente()" style="display:none;">Cancelar</button>
        </div>
    </div>

    <!-- Tabla con la lista de clientes -->
    <div class="card">
        <h2>Lista de Clientes</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Correo</th>
                        <th>Nombre</th>
                        <th>Ap. Paterno</th>
                        <th>Ap. Materno</th>
                        <th>Teléfono</th>
                        <th>Registro</th>
                        <th>Contraseña</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaClientes"></tbody>
            </table>
        </div>
    </div>

</main>

<!-- Modal para asignar o cambiar contraseña de un cliente -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitulo">
        <h3 id="modalTitulo">Asignar Contraseña</h3>
        <p class="modal-sub" id="modalSub">Establece una contraseña para este usuario.</p>

        <input type="hidden" id="modalCorreo">

        <div class="form-group" id="grupoPassActual" style="display:none;">
            <label for="passActual">Contraseña actual</label>
            <input type="password" id="passActual" placeholder="Contraseña actual">
        </div>
        <div class="form-group">
            <label for="passNueva">Nueva contraseña</label>
            <input type="password" id="passNueva" placeholder="Mínimo 8 caracteres">
        </div>
        <div class="form-group">
            <label for="passConfirmar">Confirmar contraseña</label>
            <input type="password" id="passConfirmar" placeholder="Repite la contraseña">
        </div>
        <p id="modalMensaje" class="mensaje"></p>

        <div class="modal-actions">
            <button type="button" class="btn-secondary" onclick="cerrarModal()">Cancelar</button>
            <button type="button" onclick="guardarPassword()">Guardar</button>
        </div>
    </div>
</div>

<!-- Lógica de gestión de clientes -->
<script>
window.onload = () => cargarClientes();

// Carga la lista de clientes desde el servidor
async function cargarClientes() {
    try {
        const response = await fetch("/clientes");
        const data = await response.json();
        const tabla = document.getElementById("tablaClientes");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">No hay clientes registrados</td></tr>`;
            return;
        }

        data.forEach(c => {
            const badgePass = c.tiene_password
                ? ''
                : '<span class="badge-sin-pass">Sin contraseña</span>';

            tabla.innerHTML += `
                <tr>
                    <td>${c.correo_electronico}</td>
                    <td>${c.nombre}</td>
                    <td>${c.ap_paterno}</td>
                    <td>${c.ap_materno ?? "—"}</td>
                    <td>${c.telefono ?? "—"}</td>
                    <td class="fecha">${formatFecha(c.fecha_de_registro)}</td>
                    <td>${c.tiene_password ? "<i class='bi bi-check-circle-fill' style='color:#16a34a;'></i> Configurada" : "<i class='bi bi-exclamation-triangle-fill' style='color:#f59e0b;'></i> Sin contraseña"}</td>
                    <td>
                        <div class="td-actions">
                            <button class="btn-secondary btn-sm" type="button"
                                onclick="cargarDatosEditarCliente('${c.correo_electronico}','${c.nombre}','${c.ap_paterno}','${c.ap_materno ?? ""}','${c.fecha_de_nacimiento ?? ""}','${c.telefono ?? ""}')">
                                <i class="bi bi-pencil"></i> Editar
                            </button>
                            <button class="btn-secondary btn-sm" type="button"
                                onclick="abrirModalPassword('${c.correo_electronico}', ${c.tiene_password})">
                                <i class="bi bi-key"></i> Contraseña
                            </button>
                            <button class="btn-danger btn-sm" type="button" onclick="eliminarCliente('${c.correo_electronico}')">
                                <i class="bi bi-trash"></i> Eliminar
                            </button>
                        </div>
                    </td>
                </tr>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al consultar clientes.");
    }
}

// Registra un nuevo cliente
async function agregarCliente() {
    try {
        const cliente = obtenerDatosCliente();
        const response = await fetch("/clientes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(cliente)
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        limpiarFormularioCliente();
        cargarClientes();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al agregar cliente.");
    }
}

// Carga datos del cliente en el formulario para edición
function cargarDatosEditarCliente(correo, nombre, ap_paterno, ap_materno, fecha_de_nacimiento, telefono) {
    document.getElementById("correo_electronico").value = correo;
    document.getElementById("nombre").value = nombre;
    document.getElementById("ap_paterno").value = ap_paterno;
    document.getElementById("ap_materno").value = ap_materno;
    document.getElementById("fecha_de_nacimiento").value = fecha_de_nacimiento ? fecha_de_nacimiento.split("T")[0] : "";
    document.getElementById("telefono").value = telefono;
    document.getElementById("correo_electronico").disabled = true;
    document.getElementById("formTitulo").textContent = "Editar Cliente";
    document.getElementById("btnAgregarCliente").style.display = "none";
    document.getElementById("btnActualizarCliente").style.display = "inline-flex";
    document.getElementById("btnCancelar").style.display = "inline-flex";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

// Envía los cambios del cliente editado
async function actualizarCliente() {
    try {
        const correo = document.getElementById("correo_electronico").value;
        const cliente = obtenerDatosCliente();
        const response = await fetch(`/clientes/${correo}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(cliente)
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        limpiarFormularioCliente();
        cargarClientes();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al actualizar cliente.");
    }
}

// Elimina un cliente con confirmación
async function eliminarCliente(correo) {
    if (!(await confirmar("¿Seguro que quieres eliminar este cliente?"))) return;
    try {
        const response = await fetch(`/clientes/${correo}`, { method: "DELETE" });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        cargarClientes();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al eliminar cliente.");
    }
}

// Recopila los valores del formulario
function obtenerDatosCliente() {
    return {
        correo_electronico: document.getElementById("correo_electronico").value,
        nombre:             document.getElementById("nombre").value,
        ap_paterno:         document.getElementById("ap_paterno").value,
        ap_materno:         document.getElementById("ap_materno").value,
        fecha_de_nacimiento:document.getElementById("fecha_de_nacimiento").value,
        telefono:           document.getElementById("telefono").value
    };
}

// Limpia el formulario y restaura el estado de "Agregar"
function limpiarFormularioCliente() {
    ["correo_electronico","nombre","ap_paterno","ap_materno","fecha_de_nacimiento","telefono"].forEach(id => {
        document.getElementById(id).value = "";
    });
    document.getElementById("correo_electronico").disabled = false;
    document.getElementById("formTitulo").textContent = "Agregar Cliente";
    document.getElementById("btnAgregarCliente").style.display = "inline-flex";
    document.getElementById("btnActualizarCliente").style.display = "none";
    document.getElementById("btnCancelar").style.display = "none";
}

function formatFecha(fecha) {
    if (!fecha) return "—";
    return fecha.split("T")[0];
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}

// ---- MODAL CONTRASEÑA ----

// Abre el modal para asignar o cambiar contraseña
function abrirModalPassword(correo, tienePassword) {
    document.getElementById("modalCorreo").value = correo;
    document.getElementById("passNueva").value = "";
    document.getElementById("passConfirmar").value = "";
    document.getElementById("passActual").value = "";
    document.getElementById("modalMensaje").textContent = "";
    document.getElementById("modalMensaje").className = "mensaje";

    const grupoActual = document.getElementById("grupoPassActual");
    if (tienePassword) {
        document.getElementById("modalTitulo").textContent = "Cambiar Contraseña";
        document.getElementById("modalSub").textContent = `Cambia la contraseña de ${correo}`;
        grupoActual.style.display = "block";
    } else {
        document.getElementById("modalTitulo").textContent = "Asignar Contraseña";
        document.getElementById("modalSub").textContent = `Asigna una contraseña a ${correo}`;
        grupoActual.style.display = "none";
    }

    document.getElementById("modalOverlay").classList.add("activo");
}

function cerrarModal() {
    document.getElementById("modalOverlay").classList.remove("activo");
}

// Cerrar al hacer clic fuera del modal
document.getElementById("modalOverlay").addEventListener("click", function(e) {
    if (e.target === this) cerrarModal();
});

// Valida y guarda la nueva contraseña del cliente
async function guardarPassword() {
    const correo       = document.getElementById("modalCorreo").value;
    const passActual   = document.getElementById("passActual").value;
    const passNueva    = document.getElementById("passNueva").value;
    const passConfirmar= document.getElementById("passConfirmar").value;
    const msgEl        = document.getElementById("modalMensaje");

    if (!passNueva || passNueva.length < 8) {
        msgEl.textContent = "La contraseña debe tener al menos 8 caracteres.";
        msgEl.className = "mensaje mostrar";
        return;
    }
    if (passNueva !== passConfirmar) {
        msgEl.textContent = "Las contraseñas no coinciden.";
        msgEl.className = "mensaje mostrar";
        return;
    }

    try {
        const body = { password_nueva: passNueva };
        if (passActual) body.password_actual = passActual;

        const response = await fetch(`/usuarios/${encodeURIComponent(correo)}/password`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
        });
        const data = await response.json();

        if (data.error) {
            msgEl.textContent = data.error;
            msgEl.className = "mensaje mostrar";
            return;
        }

        cerrarModal();
        mostrarMensaje(data.mensaje, "success");
        cargarClientes();
    } catch (error) {
        console.error(error);
        msgEl.textContent = "Error al guardar la contraseña.";
        msgEl.className = "mensaje mostrar";
    }
}
</script>

<script src="/confirmar.js"></script><script src="/theme.js"></script></body>
</html>
