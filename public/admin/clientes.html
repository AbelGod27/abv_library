<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("adminActivo") !== "true") {
    window.location.href = "/admin/login.html";
}
</script>

<header class="page-header">
    <h1>🧑‍💼 Gestión de Clientes</h1>
    <a href="/admin/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <!-- FORMULARIO -->
    <div class="card">
        <h2 id="formTitulo">Agregar Cliente</h2>

        <div class="form-grid">
            <div class="form-group">
                <label for="correo_electronico">Correo electrónico</label>
                <input type="email" id="correo_electronico" placeholder="correo@ejemplo.com">
            </div>
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label for="ap_paterno">Apellido paterno</label>
                <input type="text" id="ap_paterno" placeholder="Apellido paterno">
            </div>
            <div class="form-group">
                <label for="ap_materno">Apellido materno</label>
                <input type="text" id="ap_materno" placeholder="Apellido materno">
            </div>
            <div class="form-group">
                <label for="fecha_de_nacimiento">Fecha de nacimiento</label>
                <input type="date" id="fecha_de_nacimiento">
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono</label>
                <input type="text" id="telefono" placeholder="10 dígitos">
            </div>
        </div>

        <div class="form-actions">
            <button type="button" id="btnAgregarCliente" onclick="agregarCliente()">Agregar Cliente</button>
            <button type="button" id="btnActualizarCliente" onclick="actualizarCliente()" style="display:none;">Guardar Cambios</button>
            <button type="button" id="btnCancelar" class="btn-secondary" onclick="limpiarFormularioCliente()" style="display:none;">Cancelar</button>
        </div>
    </div>

    <!-- LISTA -->
    <div class="card">
        <h2>Lista de Clientes</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Correo</th>
                        <th>Nombre</th>
                        <th>Ap. Paterno</th>
                        <th>Ap. Materno</th>
                        <th>Teléfono</th>
                        <th>Registro</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaClientes"></tbody>
            </table>
        </div>
    </div>

</main>

<script>
window.onload = () => cargarClientes();

async function cargarClientes() {
    try {
        const response = await fetch("/clientes");
        const data = await response.json();
        const tabla = document.getElementById("tablaClientes");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">No hay clientes registrados</td></tr>`;
            return;
        }

        data.forEach(c => {
            tabla.innerHTML += `
                <tr>
                    <td>${c.correo_electronico}</td>
                    <td>${c.nombre}</td>
                    <td>${c.ap_paterno}</td>
                    <td>${c.ap_materno ?? "—"}</td>
                    <td>${c.telefono ?? "—"}</td>
                    <td>${formatFecha(c.fecha_de_registro)}</td>
                    <td>
                        <div class="td-actions">
                            <button class="btn-secondary btn-sm" type="button"
                                onclick="cargarDatosEditarCliente('${c.correo_electronico}','${c.nombre}','${c.ap_paterno}','${c.ap_materno ?? ""}','${c.fecha_de_nacimiento ?? ""}','${c.telefono ?? ""}')">
                                ✏️ Editar
                            </button>
                            <button class="btn-danger btn-sm" type="button" onclick="eliminarCliente('${c.correo_electronico}')">
                                🗑️ Eliminar
                            </button>
                        </div>
                    </td>
                </tr>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al consultar clientes.");
    }
}

async function agregarCliente() {
    try {
        const cliente = obtenerDatosCliente();
        const response = await fetch("/clientes", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(cliente)
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        limpiarFormularioCliente();
        cargarClientes();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al agregar cliente.");
    }
}

function cargarDatosEditarCliente(correo, nombre, ap_paterno, ap_materno, fecha_de_nacimiento, telefono) {
    document.getElementById("correo_electronico").value = correo;
    document.getElementById("nombre").value = nombre;
    document.getElementById("ap_paterno").value = ap_paterno;
    document.getElementById("ap_materno").value = ap_materno;
    document.getElementById("fecha_de_nacimiento").value = fecha_de_nacimiento ? fecha_de_nacimiento.split("T")[0] : "";
    document.getElementById("telefono").value = telefono;
    document.getElementById("correo_electronico").disabled = true;
    document.getElementById("formTitulo").textContent = "Editar Cliente";
    document.getElementById("btnAgregarCliente").style.display = "none";
    document.getElementById("btnActualizarCliente").style.display = "inline-flex";
    document.getElementById("btnCancelar").style.display = "inline-flex";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

async function actualizarCliente() {
    try {
        const correo = document.getElementById("correo_electronico").value;
        const cliente = obtenerDatosCliente();
        const response = await fetch(`/clientes/${correo}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(cliente)
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        limpiarFormularioCliente();
        cargarClientes();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al actualizar cliente.");
    }
}

async function eliminarCliente(correo) {
    if (!confirm("¿Seguro que quieres eliminar este cliente?")) return;
    try {
        const response = await fetch(`/clientes/${correo}`, { method: "DELETE" });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        cargarClientes();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al eliminar cliente.");
    }
}

function obtenerDatosCliente() {
    return {
        correo_electronico: document.getElementById("correo_electronico").value,
        nombre:             document.getElementById("nombre").value,
        ap_paterno:         document.getElementById("ap_paterno").value,
        ap_materno:         document.getElementById("ap_materno").value,
        fecha_de_nacimiento:document.getElementById("fecha_de_nacimiento").value,
        telefono:           document.getElementById("telefono").value
    };
}

function limpiarFormularioCliente() {
    ["correo_electronico","nombre","ap_paterno","ap_materno","fecha_de_nacimiento","telefono"].forEach(id => {
        document.getElementById(id).value = "";
    });
    document.getElementById("correo_electronico").disabled = false;
    document.getElementById("formTitulo").textContent = "Agregar Cliente";
    document.getElementById("btnAgregarCliente").style.display = "inline-flex";
    document.getElementById("btnActualizarCliente").style.display = "none";
    document.getElementById("btnCancelar").style.display = "none";
}

function formatFecha(fecha) {
    if (!fecha) return "—";
    return fecha.split("T")[0];
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
