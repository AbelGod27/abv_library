<!DOCTYPE html>
<!-- Archivo: admin/proveedores.html — Gestión de proveedores, asignación de libros y recepción de paquetes -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Proveedores — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<!-- Verificación de sesión admin -->
<script>
if (sessionStorage.getItem("adminActivo") !== "true") {
    window.location.href = "/admin/login.html";
}
</script>

<!-- Encabezado de la página -->
<header class="page-header">
    <h1><i class="bi bi-building"></i> Gestión de Proveedores</h1>
    <a href="/admin/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <!-- Formulario para agregar/editar proveedor -->
    <div class="card">
        <h2 id="formTitulo">Agregar Proveedor</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="nombreProveedor">Nombre del proveedor</label>
                <input type="text" id="nombreProveedor" placeholder="Nombre del proveedor">
            </div>
        </div>
        <div class="form-actions">
            <button type="button" id="btnAgregar" onclick="agregarProveedor()">Agregar Proveedor</button>
            <button type="button" id="btnActualizar" onclick="actualizarProveedor()" style="display:none;">Guardar Cambios</button>
            <button type="button" id="btnCancelar" class="btn-secondary" onclick="cancelarEdicion()" style="display:none;">Cancelar</button>
        </div>
    </div>

    <!-- Tabla con la lista de proveedores -->
    <div class="card">
        <h2>Lista de Proveedores</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaProveedores"></tbody>
            </table>
        </div>
    </div>

    <!-- Formulario para registrar recepción de paquetes de un proveedor -->
    <div class="card">
        <h2>Recibir paquete de libros</h2>
        <p style="color:#64748b; font-size:0.85rem; margin-bottom:16px;">
            Registra la recepción de libros de un proveedor. Se suma al stock de venta y préstamo.
        </p>
        <div class="form-grid">
            <div class="form-group">
                <label for="selectProvPaquete">Proveedor</label>
                <select id="selectProvPaquete" onchange="cargarLibrosProveedor()">
                    <option value="">Selecciona un proveedor</option>
                </select>
            </div>
            <div class="form-group">
                <label for="selectLibroPaquete">Libro (del proveedor)</label>
                <select id="selectLibroPaquete">
                    <option value="">Primero selecciona un proveedor</option>
                </select>
            </div>
            <div class="form-group">
                <label for="cantidadPaquete">Cantidad recibida</label>
                <input type="number" id="cantidadPaquete" min="1" value="1">
            </div>
            <div class="form-group">
                <label for="cantidadVenta">Unidades para venta</label>
                <input type="number" id="cantidadVenta" min="0" value="0">
            </div>
            <div class="form-group">
                <label for="cantidadPrestamo">Unidades para préstamo</label>
                <input type="number" id="cantidadPrestamo" min="0" value="0">
            </div>
            <div class="form-group">
                <label for="costoPaquete">Costo total del paquete ($)</label>
                <input type="number" id="costoPaquete" step="0.01" min="0" placeholder="Monto que cobra el proveedor">
            </div>
        </div>
        <div class="form-actions">
            <button type="button" onclick="recibirPaquete()">Recibir paquete</button>
        </div>
    </div>

    <!-- Formulario para asignar un libro existente a un proveedor -->
    <div class="card">
        <h2>Asignar libro a proveedor</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="selectProveedor">Proveedor</label>
                <select id="selectProveedor">
                    <option value="">Selecciona un proveedor</option>
                </select>
            </div>
            <div class="form-group" style="position:relative;">
                <label for="buscarLibroProv">Libro</label>
                <input type="text" id="buscarLibroProv" placeholder="Buscar por título, autor o ISBN..." autocomplete="off" oninput="buscarLibrosProv()">
                <input type="hidden" id="isbnSeleccionado">
                <div id="resultadosLibroProv" style="display:none; position:absolute; top:100%; left:0; right:0; z-index:10; background:#fff; border:1px solid #e2e8f0; border-radius:8px; max-height:200px; overflow-y:auto; box-shadow:0 4px 12px rgba(0,0,0,.1);"></div>
            </div>
        </div>
        <div class="form-actions">
            <button type="button" onclick="asignarLibroProveedor()">Asignar libro a proveedor</button>
        </div>
    </div>

    <!-- Tabla colapsable con las relaciones proveedor-libro -->
    <div class="card card-collapsible">
        <div class="card-header" onclick="toggleCard(this)">
            <h2>Libros por proveedor</h2>
            <button class="btn-collapse" type="button"><i class="bi bi-chevron-down"></i></button>
        </div>
        <div class="card-body">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Proveedor</th>
                            <th>ISBN</th>
                            <th>Titulo</th>
                            <th>Autor</th>
                        </tr>
                    </thead>
                    <tbody id="tablaProvLibros"></tbody>
                </table>
            </div>
        </div>
    </div>

</main>

<!-- Lógica de gestión de proveedores -->
<script>
let idEditando = null;

window.onload = () => { cargarProveedores(); cargarSelectProveedores(); cargarSelectProvPaquete(); cargarProveedoresLibros(); };

// Carga la lista de proveedores en la tabla
async function cargarProveedores() {
    try {
        const response = await fetch("/proveedores");
        const data = await response.json();
        const tabla = document.getElementById("tablaProveedores");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `<tr><td colspan="3" style="text-align:center;color:var(--text-muted)">No hay proveedores registrados</td></tr>`;
            return;
        }

        data.forEach(p => {
            tabla.innerHTML += `
                <tr>
                    <td>${p.id_proveedor}</td>
                    <td>${p.nombre}</td>
                    <td>
                        <div class="td-actions">
                            <button class="btn-secondary btn-sm" onclick="editarProveedor(${p.id_proveedor}, '${p.nombre}')">
                                <i class="bi bi-pencil"></i> Editar
                            </button>
                            <button class="btn-danger btn-sm" onclick="eliminarProveedor(${p.id_proveedor})">
                                <i class="bi bi-trash"></i> Eliminar
                            </button>
                        </div>
                    </td>
                </tr>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al consultar proveedores.");
    }
}

// Registra un nuevo proveedor
async function agregarProveedor() {
    const nombre = document.getElementById("nombreProveedor").value.trim();
    if (!nombre) { mostrarMensaje("El nombre es obligatorio."); return; }

    try {
        const response = await fetch("/proveedores", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre })
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        document.getElementById("nombreProveedor").value = "";
        cargarProveedores();
        cargarSelectProveedores();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al agregar proveedor.");
    }
}

// Carga datos del proveedor en el formulario para edición
function editarProveedor(id, nombre) {
    idEditando = id;
    document.getElementById("nombreProveedor").value = nombre;
    document.getElementById("formTitulo").textContent = "Editar Proveedor";
    document.getElementById("btnAgregar").style.display = "none";
    document.getElementById("btnActualizar").style.display = "inline-flex";
    document.getElementById("btnCancelar").style.display = "inline-flex";
    window.scrollTo({ top: 0, behavior: "smooth" });
}

// Envía los cambios del proveedor editado
async function actualizarProveedor() {
    const nombre = document.getElementById("nombreProveedor").value.trim();
    if (!nombre) { mostrarMensaje("El nombre es obligatorio."); return; }

    try {
        const response = await fetch(`/proveedores/${idEditando}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre })
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        cancelarEdicion();
        cargarProveedores();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al actualizar proveedor.");
    }
}

// Elimina un proveedor con confirmación
async function eliminarProveedor(id) {
    if (!confirm("¿Seguro que quieres eliminar este proveedor?")) return;

    try {
        const response = await fetch(`/proveedores/${id}`, { method: "DELETE" });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        cargarProveedores();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al eliminar proveedor.");
    }
}

// Cancela la edición y restaura el formulario
function cancelarEdicion() {
    idEditando = null;
    document.getElementById("nombreProveedor").value = "";
    document.getElementById("formTitulo").textContent = "Agregar Proveedor";
    document.getElementById("btnAgregar").style.display = "inline-flex";
    document.getElementById("btnActualizar").style.display = "none";
    document.getElementById("btnCancelar").style.display = "none";
}

// Alterna visibilidad de una sección colapsable
function toggleCard(header) {
    const body = header.nextElementSibling;
    const btn = header.querySelector('.btn-collapse');
    body.classList.toggle('hidden');
    btn.classList.toggle('collapsed');
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}

// === ASIGNAR LIBROS A PROVEEDORES ===

// Carga los proveedores en el select de asignación
async function cargarSelectProveedores() {
    try {
        const res = await fetch("/proveedores");
        const data = await res.json();
        const select = document.getElementById("selectProveedor");
        select.innerHTML = '<option value="">Selecciona un proveedor</option>';
        data.forEach(p => {
            select.innerHTML += `<option value="${p.id_proveedor}">${p.nombre}</option>`;
        });
    } catch (e) {
        console.error(e);
    }
}

let tempBusquedaLibroProv;

// Búsqueda de libros con autocompletado para asignar a proveedor
function buscarLibrosProv() {
    clearTimeout(tempBusquedaLibroProv);
    tempBusquedaLibroProv = setTimeout(async () => {
        const texto = document.getElementById("buscarLibroProv").value.trim();
        const contenedor = document.getElementById("resultadosLibroProv");

        if (texto.length < 2) {
            contenedor.style.display = "none";
            return;
        }

        try {
            const res = await fetch(`/libros?buscar=${encodeURIComponent(texto)}`);
            const data = await res.json();
            contenedor.innerHTML = "";

            if (data.length === 0) {
                contenedor.innerHTML = '<div style="padding:10px 14px; color:#64748b; font-size:0.85rem;">No se encontraron libros</div>';
                contenedor.style.display = "block";
                return;
            }

            data.slice(0, 15).forEach(libro => {
                const item = document.createElement("div");
                item.style.cssText = "padding:10px 14px; cursor:pointer; border-bottom:1px solid #f1f5f9; font-size:0.9rem;";
                item.innerHTML = `<strong>${libro.titulo}</strong> <span style="color:#64748b;">— ${libro.autor}</span> <small style="color:#94a3b8;">(${libro.isbn})</small>`;
                item.onmouseover = () => item.style.background = "#f8f4f0";
                item.onmouseout = () => item.style.background = "#fff";
                item.onclick = () => {
                    document.getElementById("isbnSeleccionado").value = libro.isbn;
                    document.getElementById("buscarLibroProv").value = `${libro.titulo} — ${libro.autor}`;
                    contenedor.style.display = "none";
                };
                contenedor.appendChild(item);
            });

            contenedor.style.display = "block";
        } catch (e) {
            console.error(e);
        }
    }, 300);
}

// Cierra el dropdown de resultados al hacer clic fuera
document.addEventListener("click", (e) => {
    if (!e.target.closest("#buscarLibroProv") && !e.target.closest("#resultadosLibroProv")) {
        document.getElementById("resultadosLibroProv").style.display = "none";
    }
});

// Asigna un libro a un proveedor (crea la relación)
async function asignarLibroProveedor() {
    const id_proveedor = document.getElementById("selectProveedor").value;
    const isbn = document.getElementById("isbnSeleccionado").value;

    if (!id_proveedor) { mostrarMensaje("Selecciona un proveedor."); return; }
    if (!isbn) { mostrarMensaje("Selecciona un libro."); return; }

    try {
        const res = await fetch("/proveedores-libros", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id_proveedor, isbn })
        });

        const data = await res.json();
        if (data.error) { mostrarMensaje(data.error); return; }

        mostrarMensaje(data.mensaje, "success");
        document.getElementById("selectProveedor").value = "";
        document.getElementById("buscarLibroProv").value = "";
        document.getElementById("isbnSeleccionado").value = "";
        cargarProveedoresLibros();
    } catch (e) {
        console.error(e);
        mostrarMensaje("Error al asignar libro.");
    }
}

// Carga la tabla de relaciones proveedor-libro
async function cargarProveedoresLibros() {
    try {
        const res = await fetch("/proveedores-libros");
        const data = await res.json();
        const tabla = document.getElementById("tablaProvLibros");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `<tr><td colspan="4" style="text-align:center;color:var(--text-muted)">No hay asignaciones registradas</td></tr>`;
            return;
        }

        data.forEach(r => {
            tabla.innerHTML += `
                <tr>
                    <td>${r.proveedor}</td>
                    <td>${r.isbn}</td>
                    <td>${r.titulo}</td>
                    <td>${r.autor}</td>
                </tr>`;
        });
    } catch (e) {
        console.error(e);
    }
}

// === RECIBIR PAQUETE ===

// Carga los proveedores en el select de recepción de paquetes
async function cargarSelectProvPaquete() {
    try {
        const res = await fetch("/proveedores");
        const data = await res.json();
        const select = document.getElementById("selectProvPaquete");
        select.innerHTML = '<option value="">Selecciona un proveedor</option>';
        data.forEach(p => {
            select.innerHTML += `<option value="${p.id_proveedor}">${p.nombre}</option>`;
        });
    } catch (e) {
        console.error(e);
    }
}

// Carga los libros asignados a un proveedor específico
async function cargarLibrosProveedor() {
    const idProv = document.getElementById("selectProvPaquete").value;
    const select = document.getElementById("selectLibroPaquete");

    if (!idProv) {
        select.innerHTML = '<option value="">Primero selecciona un proveedor</option>';
        return;
    }

    try {
        const res = await fetch(`/proveedores/${idProv}/libros`);
        const data = await res.json();
        select.innerHTML = '<option value="">Selecciona un libro</option>';

        if (data.length === 0) {
            select.innerHTML = '<option value="">Este proveedor no tiene libros asignados</option>';
            return;
        }

        data.forEach(l => {
            select.innerHTML += `<option value="${l.isbn}">${l.titulo} — ${l.autor}</option>`;
        });
    } catch (e) {
        console.error(e);
        select.innerHTML = '<option value="">Error al cargar libros</option>';
    }
}

// Registra la recepción de un paquete y actualiza el stock
async function recibirPaquete() {
    const id_proveedor = document.getElementById("selectProvPaquete").value;
    const isbn = document.getElementById("selectLibroPaquete").value;
    const cantidad = parseInt(document.getElementById("cantidadPaquete").value) || 0;
    const cantidad_venta = parseInt(document.getElementById("cantidadVenta").value) || 0;
    const cantidad_prestamo = parseInt(document.getElementById("cantidadPrestamo").value) || 0;
    const costo_total = parseFloat(document.getElementById("costoPaquete").value);

    if (!id_proveedor) { mostrarMensaje("Selecciona un proveedor."); return; }
    if (!isbn) { mostrarMensaje("Selecciona un libro."); return; }
    if (cantidad < 1) { mostrarMensaje("La cantidad debe ser al menos 1."); return; }
    if (isNaN(costo_total) || costo_total < 0) { mostrarMensaje("Ingresa el costo total del paquete."); return; }
    if ((cantidad_venta + cantidad_prestamo) !== cantidad) {
        mostrarMensaje(`Las unidades para venta (${cantidad_venta}) + préstamo (${cantidad_prestamo}) deben sumar ${cantidad}.`);
        return;
    }

    try {
        const res = await fetch("/proveedores/recibir-paquete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id_proveedor, isbn, cantidad, cantidad_venta, cantidad_prestamo, costo_total })
        });

        const data = await res.json();
        if (data.error) { mostrarMensaje(data.error); return; }

        mostrarMensaje(data.mensaje, "success");
        document.getElementById("cantidadPaquete").value = "1";
        document.getElementById("cantidadVenta").value = "0";
        document.getElementById("cantidadPrestamo").value = "0";
        document.getElementById("costoPaquete").value = "";
    } catch (e) {
        console.error(e);
        mostrarMensaje("Error al recibir paquete.");
    }
}
</script>

<script src="/theme.js"></script></body>
</html>
