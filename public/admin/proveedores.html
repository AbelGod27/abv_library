<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Proveedores — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<script>
if (sessionStorage.getItem("adminActivo") !== "true") {
    window.location.href = "/admin/login.html";
}
</script>

<header class="page-header">
    <h1>🏭 Gestión de Proveedores</h1>
    <a href="/admin/panel.html"><button class="btn-secondary btn-sm">← Regresar</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <!-- FORMULARIO -->
    <div class="card">
        <h2>Agregar Proveedor</h2>
        <div class="form-grid">
            <div class="form-group">
                <label for="nombreProveedor">Nombre del proveedor</label>
                <input type="text" id="nombreProveedor" placeholder="Nombre del proveedor">
            </div>
        </div>
        <div class="form-actions">
            <button type="button" onclick="agregarProveedor()">Agregar Proveedor</button>
        </div>
    </div>

    <!-- LISTA -->
    <div class="card">
        <h2>Lista de Proveedores</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                    </tr>
                </thead>
                <tbody id="tablaProveedores"></tbody>
            </table>
        </div>
    </div>

</main>

<script>
window.onload = () => cargarProveedores();

async function cargarProveedores() {
    try {
        const response = await fetch("/proveedores");
        const data = await response.json();
        const tabla = document.getElementById("tablaProveedores");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `<tr><td colspan="2" style="text-align:center;color:var(--text-muted)">No hay proveedores registrados</td></tr>`;
            return;
        }

        data.forEach(p => {
            tabla.innerHTML += `
                <tr>
                    <td>${p.id_proveedor}</td>
                    <td>${p.nombre}</td>
                </tr>`;
        });
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al consultar proveedores.");
    }
}

async function agregarProveedor() {
    try {
        const proveedor = { nombre: document.getElementById("nombreProveedor").value };
        const response = await fetch("/proveedores", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(proveedor)
        });
        const data = await response.json();
        if (data.error) { mostrarMensaje(data.error); return; }
        mostrarMensaje(data.mensaje, "success");
        document.getElementById("nombreProveedor").value = "";
        cargarProveedores();
    } catch (error) {
        console.error(error);
        mostrarMensaje("Error al agregar proveedor.");
    }
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
