<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contraseña — ABV Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">

        <div class="logo"><i class="bi bi-key" style="font-size:2.5rem;"></i></div>
        <h1>Cambiar contraseña</h1>
        <p>Es tu primer inicio de sesión. Por seguridad, debes crear una nueva contraseña.</p>

        <p id="mensaje" class="mensaje"></p>

        <div class="form-group">
            <label for="passwordNueva">Nueva contraseña (mínimo 8 caracteres)</label>
            <input type="password" id="passwordNueva" placeholder="••••••••">
        </div>

        <div class="form-group">
            <label for="passwordConfirmar">Confirmar nueva contraseña</label>
            <input type="password" id="passwordConfirmar" placeholder="••••••••"
                onkeydown="if(event.key==='Enter') cambiarPassword()">
        </div>

        <button type="button" class="btn-login" onclick="cambiarPassword()">Guardar nueva contraseña</button>

    </div>
</div>

<script>
const correo = sessionStorage.getItem("correo_cambio_password");

if (!correo) {
    window.location.href = "/login.html";
}

async function cambiarPassword() {
    const nueva = document.getElementById("passwordNueva").value;
    const confirmar = document.getElementById("passwordConfirmar").value;

    if (!nueva || nueva.length < 8) {
        mostrarMensaje("La contraseña debe tener al menos 8 caracteres.");
        return;
    }

    if (nueva !== confirmar) {
        mostrarMensaje("Las contraseñas no coinciden.");
        return;
    }

    try {
        const res = await fetch(`/usuarios/${encodeURIComponent(correo)}/password`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password_nueva: nueva })
        });

        const data = await res.json();

        if (data.error) {
            mostrarMensaje(data.error);
            return;
        }

        mostrarMensaje("Contraseña actualizada. Redirigiendo...", "success");
        sessionStorage.removeItem("correo_cambio_password");

        setTimeout(() => {
            window.location.href = "/login.html";
        }, 1500);

    } catch (e) {
        mostrarMensaje("Error al cambiar la contraseña.");
    }
}

function mostrarMensaje(texto, tipo = "error") {
    const el = document.getElementById("mensaje");
    el.textContent = texto;
    el.className = "mensaje mostrar " + tipo;
    setTimeout(() => { el.className = "mensaje"; el.textContent = ""; }, 4000);
}
</script>

</body>
</html>
