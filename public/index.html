<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<div class="landing">
    <div class="logo">📚</div>
    <h1>Abv Library</h1>
    <p id="mensaje" class="mensaje"></p>
    <p>Selecciona tu perfil para continuar</p>

    <div class="landing-cards">

        <a href="/cliente/cliente.html" class="landing-card">
            <div class="icon">🔍</div>
            <span>Cliente</span>
            <button>Entrar</button>
        </a>

        <a href="/admin/login.html" class="landing-card">
            <div class="icon">🛡️</div>
            <span>Administrador</span>
            <button>Entrar</button>
        </a>

        <a href="/bibliotecario/login.html" class="landing-card">
            <div class="icon">📖</div>
            <span>Bibliotecario</span>
            <button>Entrar</button>
        </a>

    </div>
</div>

<script>
function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
