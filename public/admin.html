<!-- public/admin.html -->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador</title>
    <link rel="stylesheet" href="principal.css">
</head>

<body>

    <h1>Agregar Libro</h1>

    <input type="text" id="isbn" placeholder="ISBN">

    <input type="text" id="titulo" placeholder="Título">

    <input type="text" id="autor" placeholder="Autor">

    <input type="text" id="editorial" placeholder="Editorial">

    <input type="text" id="version" placeholder="Versión">

    <input type="date" id="anio_publicacion" placeholder="anio_publicacion">

    <br><br>

    <button onclick="agregarLibro()">
        Agregar Libro
    </button>

    <br><br>

    <a href="index.html">
        <button>Regresar</button>
    </a>

<script>

async function agregarLibro() {

    try {

        const libro = {

            isbn:
                document.getElementById("isbn").value,

            titulo:
                document.getElementById("titulo").value,

            autor:
                document.getElementById("autor").value,

            editorial:
                document.getElementById("editorial").value,

            version:
                document.getElementById("version").value,

            anio_publicacion:
                document.getElementById("anio_publicacion").value

        };

        const response = await fetch(

            "http://localhost:3000/libros",

            {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(libro)

            }

        );

        const data = await response.json();

        if (data.error) {

            alert(data.error);
            return;

        }

        alert(data.mensaje);

    }

    catch (error) {

        console.error(error);

        alert("Error de conexión con el servidor.");

    }

}

</script>

</body>
</html>
