<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Libros — Abv Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<header class="page-header">
    <h1>🔍 Consulta de Libros</h1>
    <a href="/index.html"><button class="btn-secondary btn-sm">← Inicio</button></a>
</header>

<main class="page-content">

    <p id="mensaje" class="mensaje"></p>

    <div class="card">

        <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-bottom:20px;">

            <div class="search-bar" style="margin:0; flex:1; min-width:200px;">
                <input type="text" id="buscarLibro" placeholder="🔍  Buscar por título, autor, ISBN...">
            </div>

            <div class="contenedor-switch">
                <span>Local</span>
                <label class="switch">
                    <input type="checkbox" id="switchLibros" aria-label="Cambiar fuente de libros">
                    <span class="slider"></span>
                </label>
                <span>Global</span>
            </div>

        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Portada</th>
                        <th>ISBN</th>
                        <th>Título</th>
                        <th>Autor</th>
                        <th>Editorial</th>
                        <th>Versión</th>
                        <th>Año</th>
                    </tr>
                </thead>
                <tbody id="tablaLibros"></tbody>
            </table>
        </div>

    </div>

</main>

<script>
const inputBusqueda = document.getElementById("buscarLibro");
const switchLibros  = document.getElementById("switchLibros");
let temporizador;
let fuenteActual = "db";

window.onload = () => cargarLibros("");

inputBusqueda.addEventListener("input", () => {
    clearTimeout(temporizador);
    temporizador = setTimeout(() => cargarLibros(inputBusqueda.value), 500);
});

switchLibros.addEventListener("change", () => {
    fuenteActual = switchLibros.checked ? "api" : "db";
    inputBusqueda.value = "";
    cargarLibros("");
});

async function cargarLibros(busqueda) {
    try {
        const url = fuenteActual === "db"
            ? `/libros?buscar=${encodeURIComponent(busqueda)}`
            : `/api/libros-externos?buscar=${encodeURIComponent(busqueda)}`;

        const response = await fetch(url);
        const data = await response.json();
        const tabla = document.getElementById("tablaLibros");
        tabla.innerHTML = "";

        if (data.error) {
            tabla.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">${data.error}</td></tr>`;
            return;
        }

        if (data.length === 0) {
            tabla.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--text-muted)">No se encontraron libros</td></tr>`;
            return;
        }

        data.forEach(libro => {
            const portada = libro.isbn && libro.isbn !== "Sin ISBN"
                ? `https://covers.openlibrary.org/b/isbn/${libro.isbn}-M.jpg`
                : "https://via.placeholder.com/56x80?text=N/A";

            tabla.innerHTML += `
                <tr>
                    <td style="width:72px; min-width:72px;">
                        <img class="book-cover" src="${portada}"
                            alt="Portada de ${libro.titulo}"
                            width="56" height="80"
                            style="display:block;"
                            onerror="this.src='https://via.placeholder.com/56x80?text=N/A'">
                    </td>
                    <td>${libro.isbn ?? "—"}</td>
                    <td>${libro.titulo ?? "—"}</td>
                    <td>${libro.autor ?? "—"}</td>
                    <td>${libro.editorial ?? "—"}</td>
                    <td>${libro.version ?? "—"}</td>
                    <td>${formatFecha(libro.anio_publicacion)}</td>
                </tr>`;
        });
    } catch (error) {
        console.error(error);
    }
}

function formatFecha(fecha) {
    if (!fecha) return "—";
    return fecha.split("T")[0];
}

function mostrarMensaje(texto, tipo = "error") {
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = texto;
    mensaje.className = `mensaje mostrar ${tipo}`;
    setTimeout(() => {
        mensaje.textContent = "";
        mensaje.className = "mensaje";
    }, 4000);
}
</script>

</body>
</html>
