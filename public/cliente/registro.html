<!DOCTYPE html>
<!-- Archivo: cliente/registro.html — Formulario de registro de nuevos clientes -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta — ABV Library</title>
    <link rel="stylesheet" href="/principal.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">
        <div class="logo"><i class="bi bi-book" style="font-size:2.5rem;"></i></div>
        <h1>Crear cuenta</h1>
        <p>Regístrate como cliente para consultar el catálogo y más.</p>

        <!-- Formulario de registro con datos personales y contraseña -->
        <div class="form-group">
            <label for="correo">Correo electrónico *</label>
            <input type="email" id="correo" placeholder="tu@correo.com">
        </div>

        <div class="form-group">
            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" placeholder="Tu nombre">
        </div>

        <div class="form-group">
            <label for="apPaterno">Apellido paterno *</label>
            <input type="text" id="apPaterno" placeholder="Apellido paterno">
        </div>

        <div class="form-group">
            <label for="apMaterno">Apellido materno</label>
            <input type="text" id="apMaterno" placeholder="Apellido materno (opcional)">
        </div>

        <div class="form-group">
            <label for="fechaNac">Fecha de nacimiento *</label>
            <input type="date" id="fechaNac">
        </div>

        <div class="form-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" placeholder="10 dígitos (opcional)">
        </div>

        <div class="form-group">
            <label for="password">Contraseña * (mínimo 8 caracteres)</label>
            <div style="position:relative;">
                <input type="password" id="password" placeholder="••••••••" style="padding-right:40px;">
                <button type="button" onclick="togglePass('password', this)" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; box-shadow:none; min-width:auto; color:#64748b;">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label for="passwordConfirm">Confirmar contraseña *</label>
            <div style="position:relative;">
                <input type="password" id="passwordConfirm" placeholder="••••••••" style="padding-right:40px;"
                       onkeydown="if(event.key==='Enter') registrar()">
                <button type="button" onclick="togglePass('passwordConfirm', this)" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; box-shadow:none; min-width:auto; color:#64748b;">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button class="btn-login" onclick="registrar()">Crear cuenta</button>

        <p id="mensaje" class="mensaje"></p>

        <div class="back-link">
            ¿Ya tienes cuenta? <a href="/cliente/cliente.html">Inicia sesión</a>
        </div>
        <div class="back-link">
            <a href="/">← Volver al inicio</a>
        </div>
    </div>
</div>

<!-- Lógica de registro de cliente -->
<script>
// Valida los campos y envía el registro al servidor
async function registrar() {
    const correo = document.getElementById("correo").value.trim();
    const nombre = document.getElementById("nombre").value.trim();
    const ap_paterno = document.getElementById("apPaterno").value.trim();
    const ap_materno = document.getElementById("apMaterno").value.trim();
    const fecha_de_nacimiento = document.getElementById("fechaNac").value;
    const telefono = document.getElementById("telefono").value.trim();
    const password = document.getElementById("password").value;
    const passwordConfirm = document.getElementById("passwordConfirm").value;

    // Validaciones del lado del cliente
    if (!correo || !nombre || !ap_paterno || !fecha_de_nacimiento || !password) {
        mostrarMensaje("Completa todos los campos obligatorios (*)", "error");
        return;
    }

    const regexCorreo = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!regexCorreo.test(correo)) {
        mostrarMensaje("Ingresa un correo electrónico válido.", "error");
        return;
    }

    if (password.length < 8) {
        mostrarMensaje("La contraseña debe tener al menos 8 caracteres.", "error");
        return;
    }

    if (password !== passwordConfirm) {
        mostrarMensaje("Las contraseñas no coinciden.", "error");
        return;
    }

    try {
        const res = await fetch("/registro-cliente", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                correo_electronico: correo,
                nombre,
                ap_paterno,
                ap_materno: ap_materno || null,
                fecha_de_nacimiento,
                telefono: telefono || null,
                password
            })
        });

        const data = await res.json();

        if (res.ok) {
            mostrarMensaje(data.mensaje || "Cuenta creada. Redirigiendo…", "success");
            setTimeout(() => {
                window.location.href = "/cliente/cliente.html";
            }, 1500);
        } else {
            mostrarMensaje(data.error || "Error al crear la cuenta.", "error");
        }
    } catch (err) {
        mostrarMensaje("Error de conexión con el servidor.", "error");
    }
}

function togglePass(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { input.type = 'password'; icon.className = 'bi bi-eye'; }
}

// Muestra un mensaje temporal al usuario
function mostrarMensaje(texto, tipo) {
    const el = document.getElementById("mensaje");
    el.textContent = texto;
    el.className = "mensaje mostrar " + tipo;
    setTimeout(() => {
        el.className = "mensaje";
        el.textContent = "";
    }, 5000);
}
</script>

<script src="/confirmar.js"></script><script src="/theme.js"></script></body>
</html>
