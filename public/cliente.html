<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente</title>
    <link rel="stylesheet" href="principal.css">
</head>

<body>

    <h1>Consulta de Libros</h1>

    <input
        type="text"
        id="buscarLibro"
        placeholder="Buscar libro..."
    >

    <br><br>

    <table border="1">

        <thead>
            <tr>
                <th>ISBN</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Editorial</th>
                <th>Versión</th>
                <th>Año</th>
            </tr>
        </thead>

        <tbody id="tablaLibros"></tbody>

    </table>

    <br>

    <a href="index.html">
        <button>Regresar</button>
    </a>

<script>
const inputBusqueda = document.getElementById("buscarLibro");
let temporizador;

inputBusqueda.addEventListener("input", () => {
    clearTimeout(temporizador);

    temporizador = setTimeout(() => {
        cargarLibros(inputBusqueda.value);
    }, 250); <!--Se genera esté temporizador con la intención de que las busquedas se hagan después de teclear una letra -->
});

window.onload = () => {
    cargarLibros("");
};

async function cargarLibros(busqueda) {
    try {
        const response = await fetch(
            `http://localhost:3000/api/libros-externos?buscar=${encodeURIComponent(busqueda)}`
        );

        const data = await response.json();

        if (data.error) {
            console.error(data.error);
            return;
        }

        const tabla = document.getElementById("tablaLibros");
        tabla.innerHTML = "";

        if (data.length === 0) {
            tabla.innerHTML = `
                <tr>
                    <td colspan="6">No se encontraron libros</td>
                </tr>
            `;
            return;
        }

        data.forEach(libro => {
            tabla.innerHTML += `
                <tr>
                    <td>${libro.isbn}</td>
                    <td>${libro.titulo}</td>
                    <td>${libro.autor}</td>
                    <td>${libro.editorial ?? ""}</td>
                    <td>${libro.version ?? ""}</td>
                    <td>${libro.anio_publicacion ?? ""}</td>
                </tr>
            `;
        });

    } catch (error) {
        console.error("Error al consultar libros:", error);
    }
}
</script>

</body>
</html>
