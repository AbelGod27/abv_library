<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cliente</title>
    <link rel="stylesheet" href="principal.css">
</head>
<body>

    <h1>Consulta de Libros</h1>

    <div class="contenedor-switch">

    <span>
        Local
    </span>

    <label class="switch">

        <input
            type="checkbox"
            id="switchLibros"
            aria-label="Cambiar biblioteca"
        >

        <span class="slider"></span>

    </label>

    <span>
        Global
    </span>

</div>

    <br><br>

    <input type="text" id="buscarLibro" placeholder="Buscar libro...">

    <br><br>

    <table border="1">
        <thead>
            <tr>
                <th>ISBN</th>
                <th>Título</th>
                <th>Autor</th>
                <th>Editorial</th>
                <th>Versión</th>
                <th>Año</th>
            </tr>
        </thead>

        <tbody id="tablaLibros"></tbody>
    </table>

    <br>

    <a href="index.html">
        <button>Regresar</button>
    </a>

<script>
const inputBusqueda = document.getElementById("buscarLibro");
let temporizador;
let fuenteActual = "db";

window.onload = () => {
    cargarLibros("");
};

inputBusqueda.addEventListener("input", () => {
    clearTimeout(temporizador);

    temporizador = setTimeout(() => {
        cargarLibros(inputBusqueda.value);
    }, 500);
});

function cambiarFuente(fuente) {
    fuenteActual = fuente;
    inputBusqueda.value = "";
    cargarLibros("");
}

async function cargarLibros(busqueda) {
    try {
        let url = "";

        if (fuenteActual === "db") {
            url = `/libros?buscar=${encodeURIComponent(busqueda)}`;
        } else {
            url = `/api/libros-externos?buscar=${encodeURIComponent(busqueda)}`;
        }

        const response = await fetch(url);
        const data = await response.json();

        const tabla = document.getElementById("tablaLibros");
        tabla.innerHTML = "";

        if (data.error) {
            tabla.innerHTML = `
                <tr>
                    <td colspan="6">${data.error}</td>
                </tr>
            `;
            return;
        }

        if (data.length === 0) {
            tabla.innerHTML = `
                <tr>
                    <td colspan="6">No se encontraron libros</td>
                </tr>
            `;
            return;
        }

        data.forEach(libro => {
            tabla.innerHTML += `
                <tr>
                    <td>${libro.isbn ?? ""}</td>
                    <td>${libro.titulo ?? ""}</td>
                    <td>${libro.autor ?? ""}</td>
                    <td>${libro.editorial ?? ""}</td>
                    <td>${libro.version ?? ""}</td>
                    <td>${libro.anio_publicacion ?? ""}</td>
                </tr>
            `;
        });

    } catch (error) {
        console.error(error);
    }
}
const switchLibros =
    document.getElementById("switchLibros");

switchLibros.addEventListener("change", () => {

    if (switchLibros.checked) {

        fuenteActual = "api";

    }

    else {

        fuenteActual = "db";

    }

    inputBusqueda.value = "";

    cargarLibros("");

});
</script>

</body>
</html>
