<!DOCTYPE html>
<!-- Archivo: login.html — Página de inicio de sesión unificada para todos los roles -->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — ABV Library</title>
    <script src="./config.js"></script>
    <link rel="stylesheet" href="./principal.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-box">

        <div class="logo"><i class="bi bi-book" style="font-size:2.5rem;"></i></div>
        <h1>Iniciar sesión</h1>
        <p>Ingresa tus credenciales para acceder</p>

        <p id="mensaje" class="mensaje"></p>

        <!-- Paso 1: Formulario de correo y contraseña -->
        <div id="paso1">
            <div class="form-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div style="position:relative;">
                    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" style="padding-right:40px;"
                        onkeydown="if(event.key==='Enter') iniciarSesion()">
                    <button type="button" onclick="togglePass('password', this)" style="position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; padding:4px; box-shadow:none; min-width:auto; color:#64748b;">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <button type="button" class="btn-login" id="btnLogin" onclick="iniciarSesion()">Ingresar</button>
        </div>

        <!-- Paso 2: Selección de rol (si el usuario tiene varios roles) -->
        <div id="paso2" style="display:none;">
            <p style="font-weight:500; margin-bottom:16px;">Hola, <span id="nombreUsuario"></span>. Elige cómo quieres entrar:</p>
            <div id="opcionesRol" style="display:flex; flex-direction:column; gap:12px;"></div>
            <button type="button" class="btn-secondary" style="margin-top:16px; width:100%;" onclick="volverPaso1()">Cancelar</button>
        </div>

        <div class="back-link" style="margin-top:20px;">
            ¿No tienes cuenta? <a href="./cliente/registro.html">Regístrate como cliente</a>
        </div>
        <div class="back-link">
            <a href="./index.html">← Volver al inicio</a>
        </div>

    </div>
</div>

<!-- Lógica de autenticación -->
<script>
let datosLogin = null;

// Envía credenciales al servidor y maneja la respuesta
async function iniciarSesion() {
    const correo = document.getElementById("correo").value.trim();
    const password = document.getElementById("password").value;

    if (!correo || !password) {
        mostrarMensaje("Ingresa correo y contraseña.");
        return;
    }

    // Mostrar estado de carga
    const btn = document.getElementById("btnLogin");
    btn.disabled = true;
    btn.textContent = "Cargando...";

    try {
        const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ correo_electronico: correo, password })
        });

        const data = await res.json();

        if (data.error) {
            mostrarMensaje(data.error);
            btn.disabled = false;
            btn.textContent = "Ingresar";
            return;
        }

        datosLogin = data;

        // Si solo tiene un rol, redirigir directamente
        if (data.roles.length === 1) {
            redirigirPorRol(data.roles[0], data);
            return;
        }

        // Si tiene varios roles, mostrar opciones para elegir
        document.getElementById("paso1").style.display = "none";
        document.getElementById("paso2").style.display = "block";
        document.getElementById("nombreUsuario").textContent = data.nombre;

        const contenedor = document.getElementById("opcionesRol");
        contenedor.innerHTML = "";

        const iconos = {
            admin: "bi-shield-lock",
            bibliotecario: "bi-journal-bookmark",
            cliente: "bi-person"
        };

        data.roles.forEach(rol => {
            const btn = document.createElement("button");
            btn.className = "btn-login";
            btn.style.cssText = "display:flex; align-items:center; justify-content:center; gap:10px;";
            btn.innerHTML = `<i class="bi ${iconos[rol.tipo] || 'bi-person'}"></i> Entrar como ${rol.label}`;
            btn.onclick = () => redirigirPorRol(rol, datosLogin);
            contenedor.appendChild(btn);
        });

    } catch (e) {
        mostrarMensaje("Error de conexión con el servidor. Intenta de nuevo en unos segundos.");
        btn.disabled = false;
        btn.textContent = "Ingresar";
    }
}

// Redirige al panel correspondiente según el rol seleccionado
function redirigirPorRol(rol, data) {
    // Si debe cambiar contraseña, redirigir al cambio obligatorio
    if (data.debe_cambiar_contrasena) {
        sessionStorage.setItem("correo_cambio_password", data.correo_electronico);
        window.location.href = "./cambiar-password.html";
        return;
    }

    if (rol.tipo === "admin") {
        sessionStorage.setItem("adminActivo", "true");
        sessionStorage.setItem("correoAdmin", data.correo_electronico);
        sessionStorage.setItem("nombreAdmin", data.nombre);
        sessionStorage.setItem("soloLectura", rol.rol === "Vendedor" ? "true" : "false");
        window.location.href = "./admin/panel.html";

    } else if (rol.tipo === "bibliotecario") {
        sessionStorage.setItem("bibliotecarioActivo", "true");
        sessionStorage.setItem("correoBibliotecario", data.correo_electronico);
        sessionStorage.setItem("nombreBibliotecario", data.nombre);
        sessionStorage.setItem("rolBibliotecario", rol.rol);
        window.location.href = "./bibliotecario/panel.html";

    } else if (rol.tipo === "cliente") {
        localStorage.setItem("cliente", JSON.stringify({
            correo_electronico: data.correo_electronico,
            nombre: data.nombre,
            ap_paterno: data.ap_paterno,
            login_timestamp: Date.now()
        }));
        window.location.href = "./cliente/cliente.html";
    }
}

// Vuelve al paso 1 (formulario de credenciales)
function volverPaso1() {
    document.getElementById("paso1").style.display = "block";
    document.getElementById("paso2").style.display = "none";
    datosLogin = null;
}

// Alterna visibilidad de la contraseña
function togglePass(id, btn) {
    const input = document.getElementById(id);
    const icon = btn.querySelector('i');
    if (input.type === 'password') { input.type = 'text'; icon.className = 'bi bi-eye-slash'; }
    else { input.type = 'password'; icon.className = 'bi bi-eye'; }
}

// Muestra un mensaje temporal al usuario
function mostrarMensaje(texto, tipo = "error") {
    const el = document.getElementById("mensaje");
    el.textContent = texto;
    el.className = "mensaje mostrar " + tipo;
    setTimeout(() => {
        el.className = "mensaje";
        el.textContent = "";
    }, 4000);
}
</script>

<script src="./confirmar.js"></script><script src="./theme.js"></script></body>
</html>
